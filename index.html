<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive</title>
    
    <script src="data.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f1115; 
            color: #e2e8f0;
            background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%);
            background-attachment: fixed;
        }

        .glass { 
            background: rgba(30, 35, 45, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .white-card { 
            background: #ffffff;
            color: #1a1d23; 
            border-radius: 1.5rem; 
            transition: all 0.3s ease; 
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .white-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }

        .input-field { 
            background: #1e232d; 
            border: 1px solid #334155; 
            border-radius: 1rem; 
            padding: 1.15rem; 
            width: 100%; 
            outline: none; 
            color: #f8fafc;
        }

        .status-glow-red { border-left: 6px solid #ef4444 !important; }
        .status-glow-green { border-left: 6px solid #10b981 !important; }
        .status-glow-yellow { border-left: 6px solid #f59e0b !important; }
        
        .trophy-active { color: #facc15; filter: drop-shadow(0 0 8px rgba(250, 204, 21, 0.6)); }

        .sync-success { background: rgba(16, 185, 129, 0.1) !important; border-color: rgba(16, 185, 129, 0.3) !important; color: #10b981 !important; }
        .sync-error { background: rgba(244, 63, 94, 0.1) !important; border-color: rgba(244, 63, 94, 0.3) !important; color: #f43f5e !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-10 pb-32">

    <div id="syncIndicator" class="fixed top-8 right-8 z-[200] hidden">
        <div class="glass px-4 py-2 rounded-full flex items-center gap-2 border border-slate-700">
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-300">Processing Cloud Sync...</span>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-800 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8 tracking-tighter">Secure <span class="text-slate-500">Access</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest transition-all">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <header id="appHeader" class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-6">
            <div>
                <h1 class="text-4xl md:text-5xl font-800 italic uppercase tracking-tighter text-white">Retailer <span class="text-slate-500">Intelligence</span></h1>
                <div class="flex items-center gap-4 text-slate-500 font-semibold text-[11px] mt-2 uppercase tracking-widest">
                    <span class="flex items-center gap-2"><i data-lucide="calendar-days" class="w-4 h-4 text-emerald-500"></i> <span id="topDate">-- ---</span></span>
                    <span class="flex items-center gap-2"><i data-lucide="timer" class="w-4 h-4 text-rose-500"></i> <span id="topDaysLeft">-- Days Left</span></span>
                </div>
            </div>
            <div id="syncBtnContainer" onclick="document.getElementById('fileInput').click()" class="glass px-6 py-4 rounded-2xl cursor-pointer transition-all flex items-center gap-4 border border-white/5">
                <i id="syncIcon" data-lucide="refresh-ccw" class="w-5 h-5 text-blue-400"></i>
                <span id="syncText" class="text-xs font-bold uppercase tracking-wider text-blue-400">Sync Dataset</span>
                <input type="file" id="fileInput" class="hidden" accept=".xlsx">
            </div>
        </header>

        <div id="filterControls" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            <select id="regionSelect" onchange="updateAreas()" class="input-field font-bold uppercase text-xs tracking-widest">
                <option value="">Select Region</option>
                <option value="CPR">CPR (Central)</option><option value="NPR">NPR (North)</option>
                <option value="SPR">SPR (South)</option><option value="S&B">S&B (Sindh/Baloch)</option>
            </select>
            <select id="areaSelect" onchange="renderTerritoryView()" disabled class="input-field font-bold uppercase text-xs tracking-widest opacity-40">
                <option value="">Select Area Cluster</option>
            </select>
        </div>

        <main id="contentRoot">
            <div id="emptyState" class="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-[3rem]">
                <i data-lucide="layout-grid" class="w-10 h-10 text-slate-700 mb-4"></i>
                <p class="text-slate-700 font-800 uppercase text-xs tracking-[0.4em]">Awaiting Selection</p>
            </div>
            <section id="territorySection" class="hidden"><div id="territoryGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
            <section id="marketSection" class="hidden">
                <div class="mb-8"><button onclick="showMarkets(currentTerritory)" class="flex items-center gap-2 text-slate-500 font-bold uppercase text-[10px] tracking-widest hover:text-white"><i data-lucide="chevron-left" class="w-4 h-4 text-blue-500"></i> Back</button></div>
                <div id="marketGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            </section>
            <section id="shopSection" class="hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                    <button id="backBtn" class="flex items-center gap-2 text-slate-500 font-bold uppercase text-[10px] tracking-widest hover:text-white"><i data-lucide="chevron-left" class="w-4 h-4 text-blue-500"></i> Back to Markets</button>
                    <div class="relative w-full md:w-64"><i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-blue-400"></i><input type="text" id="shopSearch" oninput="filterShops()" placeholder="SEARCH SHOP..." class="glass !bg-transparent border-slate-700 rounded-full pl-10 pr-6 py-2 text-xs font-bold w-full text-white"></div>
                </div>
                <div id="shopList" class="grid gap-3"></div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[150] bg-[#0f1115]/98 backdrop-blur-xl hidden overflow-y-auto">
        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <div id="modalHeader" class="flex justify-end mb-8"><button onclick="closeModal()" class="flex items-center gap-2 text-slate-400 hover:text-rose-500 uppercase font-bold text-xs tracking-widest transition-colors">CLOSE VIEW <i data-lucide="x" class="w-5 h-5"></i></button></div>
            <div id="modalBody" class="bg-[#1a1d23] rounded-[3rem] p-8 md:p-16 border border-slate-800 shadow-2xl"></div>
        </div>
    </div>

    <script>
        const GIST_ID = "1c566a18fa48fd05d3e65b560b0a6853";
        const GITHUB_TOKEN = "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";
        let performanceData = [];
        let currentTerritory = '';
        const hierarchyData = {"CPR":{"Lahore":{"Kasur":["Kasur"],"Mughalpura":["Lahore"],"Gulberg":["Lahore"],"DHA":["Lahore"],"Raiwind":["Lahore"],"Shahdara":["Shahdara"],"Samanabad":["Lahore"],"Islampura":["Lahore"],"Railway Station":["Lahore"],"Mall Road":["Lahore"],"Wall City":["Lahore"],"Model Town":["Lahore"],"Township":["Lahore"]},"Faisalabad":{"Jhang":["AP Sial","Jhang"],"Pensera":["AP Banglow","Bhowana","Pensera"],"Rabwah":["Rabwah"],"Faisalabad-A":["Faisalabad"],"Faisalabad-B":["Faisalabad"],"Faisalabad-C":["Faisalabad"],"Toba Tek Singh":["Gojra","Shorkot","Toba Tek Singh"],"Jaranwala":["Jaranwala"],"MoreKhunda":["MoreKhunda"],"Shahkot":["Shahkot"],"Samundri":["Mureedwala","Samundri","Tandlianwala"]},"Gujranwala":{"Sialkot":["Daska","Sialkot"],"Daska":["Daska","Pasrur","Sambrial"],"Narowal":["Narang Mandi","Narowal","Shakargarh","Zafarwal"],"Wazirabad":["Ali Pur Chattha","Qilla Didar Singh","Wazirabad"],"Gujranwala-A":["Gujranwala"],"Gujranwala-B":["Gujranwala","Gujranwala Cantt"],"Hafizabad":["Hafizabad","Nowshera Virkan","Pindi Bhattian"],"Sheikhupura":["Farooqabad","Khanqa Dogran","Sheikhupura"],"Kamoke":["Kamoke","Muridke"]}},"NPR":{"Islamabad":{"Chakwal":["Chakwal"],"Talagang":["Fateh Jang","Talagang"],"Murree":["Gujar Khan","Kahuta","Kallar","Murree"],"Islamabad West":["Islamabad"],"Islamabad Suburb":["Islamabad"],"Islamabad East":["Islamabad"],"Rawalpindi A":["Rawalpindi"],"Rawalpindi B":["Rawalpindi"],"Rawalpindi C":["Rawalpindi"]},"Jhelum":{"Gujrat":["Daulat Nagar","Gujrat","Jalalpur"],"Dinga":["Lalamusa","Phalia"],"Mirpur":["Islamghar","Mirpur"],"Mandibhaudin":["Khewra","Mandi Bahauddin","PDKhan","Pinanwal"],"Jhelum":["Jhelum"]},"Northern Area":{"Abbottabad":["Abbottabad","Haripur"],"Wah":["Attock","Taxila","Wah Cantt"],"Muzaffarabad":["Bagh","Muzaffarabad"],"Mansehra":["Balakot","Besham","Mansehra"],"Rawalakot":["F Kahutta","Hajeera","Rawalakot"],"Gilgit":["Gilgit","Skardu"],"Kotli":["Kotli","Plandri"]},"Peshawar":{"DI Khan":["Bannu","DIKhan","Wana"],"Minghora":["Batkhela","Chitral","Mingora","Timergara"],"Peshawar B":["Charsadda","Peshawar"],"Kohat":["Hangu","Karak","Kohat"],"Mardan":["Mardan","Nowshera","Swabi"],"Peshawar A":["Peshawar"]},"Sargodha":{"Bhalwal":["Bhalwal","Bhera","Kotmomin"],"Mianwali":["Isakhel","Mianwali","Quaidabad","Rangpur"],"Joharabad":["Khushab","Sillanwali"],"Sargodha A":["Sargodha"],"Sargodha B":["Sargodha"]}},"SPR":{"Bahawalpur":{"Khanbela":["AP East","Khanbela"],"Bahawalpur":["Bahawalpur"],"Chishtian":["Chishtian"],"Yazman":["Faqirwali","Yazman"],"Lodhran":["Jalalpur Pirwala","Lodhran"],"RYK":["Rahim Yar Khan"]},"DG Khan":{"Bhakkar":["Bhakkar"],"Layyah":["Layyah"],"Kot Addu":["Chowkmunda","Kot Addu","Taunsa"],"Rajanpur":["Fazilpur","Jampur","Rajanpur","Rojhan"],"Muzaffargarh":["Jatoi","Muzafargarh","Rohilanwali"],"DG Khan":["DG Khan","Kot Chutta","Sakhi Sarwar"]},"Sukkur":{"Khairpur":["Choondko","Gambat","Khairpur Mirs","Pir Jo Goth"],"Jacobabad":["Dera Allah Yar","JACOBABAD","Kandhkot","Kandhkot","Kandhkot","Kashmore","Usta Muhammad"],"Ghotki":["Ghotki","Mirpur Mathelo","Rohri","UBARO"],"Sukkur":["Shikarpur","Sukkur","Thull"]},"Sahiwal":{"Sahiwal":["Sahiwal"],"Arifwala":["Arifwala","Bahawalnagar"],"Chichawatni":["Chichawatni","Kamalia"],"Pakpattan":["Depalpur","Minchinabad","Pakpattan","Theeng More"],"Pattoki":["Pattoki","Theeng More"],"Okara":["Okara","Renala Khurd"]},"Multan":{"Burewala":["Burewala","Luddan"],"Dunyapur":["Dunyapur","Mailsi"],"Vehari":["Jahanian","Vehari"],"Kabirwala":["Kabirwala"],"Khanewal":["Khanewal"],"Multan":["Multan"],"Mian Channu":["Mianchanu","Pir Mahal"]}},"S&B":{"Hyderabad":{"Badin Territory":["Badin","Golrachi","Matli","Tando Muhammad Khan"],"Thar Territory":["Digri","Kunri","Naukot","Umerkot"],"Hyderabad Territory":["Hyderabad","Jamshoro","Kotri"],"Mirpurkhas Territory":["Khipro","Mirpurkhas","Tando Allahyar"],"Thatta Territory":["Nooriabad","Thatta"],"TandoAdam Territory":["SP Chakar","Saeedabad","Sanghar","Shahdadpur","Tando Adam"]},"Karachi":{"DHA":["Karachi"],"GIB":["Karachi"],"KBR":["Karachi"],"KRG":["Karachi"],"LDI":["Karachi"],"MLR":["Karachi"],"MTV":["Karachi"],"NKR":["Karachi"],"OLC":["Karachi"]},"Nawabshah":{"Naushero Territory":["Bhiria","Kandiaro","Mehrabpur","Moro","Naushero Feroze","Nawabshah","Qazi Ahmed"],"Dadu Territory":["Dadu","Khairpur Nathan Shah","Mehar","Sann","Sehwan"],"Nawabshah":["Daur","Nawabshah","Qazi Ahmed"],"Nawabshah Territory":["Nawabshah"],"Kamber Territory":["Kamber Ali khan","Naseerabad","Shahdad kot"],"Larkana Territory":["Larkana","Naudero","Ratodero"]},"Quetta":{"Coastal Territory":["Gwadar","Uthal"],"Khuzdar Territory":["Khuzdar","Mastung"],"Lorlai Territory":["Loralai","Qilla Saifullah","ZHOB"],"Quetta B Territory":["Pishin"],"Quetta A Territory":["Quetta"]}}};
        
        window.onload = async () => {
            const now = new Date();
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('topDate').innerText = `${now.getDate()} ${months[now.getMonth()]}`;
            document.getElementById('topDaysLeft').innerText = `${new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - now.getDate() || 1} Days Left`;
            await syncFromCloud();
            lucide.createIcons();
            checkRetailerAccess();
        };

        async function syncFromCloud() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`);
                if (res.ok) {
                    const data = await res.json();
                    performanceData = JSON.parse(data.files["data.json"].content);
                } else { throw new Error(); }
            } catch (e) {
                // FIXED FALLBACK LOGIC
                if (typeof retailerData !== 'undefined') {
                    performanceData = Object.keys(retailerData).map(id => ({
                        'Bizom ID': id,
                        'Shop Name': retailerData[id].name,
                        'Target': retailerData[id].target,
                        'Total Sales': retailerData[id].balance,
                        '6mg': retailerData[id]['6mg'] || 0,
                        '10mg': retailerData[id]['10mg'] || 0,
                        '14mg': retailerData[id]['14mg'] || 0,
                        '17mg': retailerData[id]['17mg'] || 0,
                        'Market': retailerData[id].market || "Kasur"
                    }));
                }
            }
        }

        async function pushToCloud(data) {
            const btn = document.getElementById('syncBtnContainer');
            const icon = document.getElementById('syncIcon');
            const text = document.getElementById('syncText');
            document.getElementById('syncIndicator').classList.remove('hidden');
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(data) } } })
                });
                if(res.ok) {
                    performanceData = data;
                    btn.classList.add('sync-success');
                    icon.classList.replace('text-blue-400', 'text-emerald-400');
                    text.classList.replace('text-blue-400', 'text-emerald-400');
                    text.innerText = "Cloud Synced";
                } else { throw new Error(); }
            } catch (e) {
                btn.classList.add('sync-error');
                icon.classList.replace('text-blue-400', 'text-rose-400');
                text.classList.replace('text-blue-400', 'text-rose-400');
                text.innerText = "Sync Failed";
            }
            document.getElementById('syncIndicator').classList.add('hidden');
        }

        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                lucide.createIcons();
            } else { alert("Invalid Credentials"); }
        }

        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const workbook = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                const data = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                await pushToCloud(data);
            };
            reader.readAsArrayBuffer(file);
        };

        function norm(s) { return String(s || "").toLowerCase().replace(/\s/g, '').trim(); }
        function getExcelVal(row, key) {
            const target = norm(key);
            for (let k in row) { if (norm(k).includes(target)) return row[k]; }
            return "";
        }

        function updateAreas() {
            const reg = document.getElementById('regionSelect').value;
            const areaSel = document.getElementById('areaSelect');
            areaSel.innerHTML = '<option value="">Select Area Cluster</option>';
            if(reg) {
                Object.keys(hierarchyData[reg]).sort().forEach(a => areaSel.innerHTML += `<option value="${a}">${a}</option>`);
                areaSel.disabled = false;
                areaSel.classList.remove('opacity-40');
            }
            hideAll();
            document.getElementById('emptyState').classList.remove('hidden');
        }

        function renderTerritoryView() {
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            const territories = Object.keys(hierarchyData[reg][area]).sort();
            hideAll();
            document.getElementById('territorySection').classList.remove('hidden');
            document.getElementById('territoryGrid').innerHTML = territories.map(t => `<div onclick="showMarkets('${t}')" class="white-card p-10 h-44 flex flex-col justify-center text-center"><i data-lucide="map-pinned" class="w-8 h-8 text-blue-500 mx-auto mb-4"></i><h4 class="text-xl font-800 uppercase italic tracking-tighter">${t}</h4></div>`).join('');
            lucide.createIcons();
        }

        function showMarkets(tName) {
            currentTerritory = tName;
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            const markets = hierarchyData[reg][area][tName].sort();
            hideAll();
            document.getElementById('marketSection').classList.remove('hidden');
            document.getElementById('marketGrid').innerHTML = markets.map(m => `<div onclick="showShops('${m}')" class="white-card p-6 h-32 flex items-center justify-center text-center"><h4 class="text-[10px] font-800 uppercase tracking-widest">${m}</h4></div>`).join('');
        }

        function showShops(mName) {
            hideAll();
            document.getElementById('shopSection').classList.remove('hidden');
            document.getElementById('backBtn').onclick = () => showMarkets(currentTerritory);
            const filtered = performanceData.filter(r => norm(getExcelVal(r, 'Market')) === norm(mName));
            document.getElementById('shopList').innerHTML = filtered.length ? filtered.map(r => {
                const bizId = getExcelVal(r, 'Bizom ID');
                const name = getExcelVal(r, 'Shop Name');
                const target = parseFloat(getExcelVal(r, 'Target')) || 0;
                const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
                const statusClass = actual >= target ? 'status-glow-green' : (actual > 0 ? 'status-glow-yellow' : 'status-glow-red');
                return `
                <div onclick="openDrilldown('${bizId}')" class="bg-white p-6 rounded-2xl flex justify-between items-center cursor-pointer hover:scale-[1.01] transition-all ${statusClass}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center"><i data-lucide="store" class="w-5 h-5 text-blue-600"></i></div>
                        <div><h4 class="text-sm font-800 text-slate-900 uppercase italic">${name}</h4><p class="text-[9px] text-slate-500 font-bold uppercase tracking-wider">ID: ${bizId}</p></div>
                    </div>
                    <div class="flex items-center gap-6">
                        <div class="text-right hidden md:block"><p class="text-[9px] text-slate-400 font-bold uppercase mb-1">Performance</p><div class="w-24 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div class="h-full bg-blue-600" style="width: ${Math.min((actual/target)*100, 100)}%"></div></div></div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300"></i>
                    </div>
                </div>`;
            }).join('') : `<div class="text-center p-12 bg-slate-900/50 rounded-[2rem] border border-dashed border-slate-800"><p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest">No Retailers Found in ${mName}</p></div>`;
            lucide.createIcons();
        }

        function openDrilldown(bizId) {
            const r = performanceData.find(i => String(getExcelVal(i, 'Bizom ID')) === String(bizId));
            if(!r) return;
            const name = getExcelVal(r, 'Shop Name'), target = parseFloat(getExcelVal(r, 'Target')) || 0, actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
            const daysLeft = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - new Date().getDate() || 1;
            const rrr = ((target - actual) / daysLeft).toFixed(1);
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('modalBody').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 text-center md:text-left">
                    <div>
                        <h2 class="text-4xl md:text-6xl font-800 text-white italic tracking-tighter uppercase mb-4">${name}</h2>
                        <div class="flex flex-wrap justify-center md:justify-start gap-3">
                            <span class="px-6 py-2 bg-slate-800 rounded-full text-[11px] font-bold text-slate-400 uppercase tracking-widest border border-slate-700">BIZOM ID: ${bizId}</span>
                            <button id="qrGenBtn" onclick="generateQR('${bizId}')" class="px-6 py-2 bg-blue-600/10 hover:bg-blue-600/20 rounded-full text-[11px] font-bold text-blue-400 uppercase tracking-widest border border-blue-500/30 transition-all flex items-center gap-2">Generate Share Link <i data-lucide="qr-code" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                    <div class="text-center bg-[#111419] p-8 rounded-[2.5rem] border border-white/5 min-w-[180px]"><span class="text-[10px] text-slate-500 font-bold uppercase block mb-2">Achievement</span><p class="text-5xl font-800 text-white tracking-tighter">${Math.round((actual/target)*100) || 0}<span class="text-xl text-blue-500">%</span></p></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 font-bold uppercase block mb-2">Target</span><p class="text-2xl font-800">${target}</p></div>
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 font-bold uppercase block mb-2">Actual</span><p class="text-2xl font-800 text-emerald-500">${actual}</p></div>
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 font-bold uppercase block mb-2">Daily RRR</span><p class="text-2xl font-800 text-slate-300">${rrr > 0 ? rrr : 0}</p></div>
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 font-bold uppercase block mb-2">Deficit</span><p class="text-2xl font-800 text-rose-500">${target - actual > 0 ? Math.round(target-actual) : 0}</p></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-[#111419] rounded-[2.5rem] p-8 border border-white/5"><div class="h-64"><canvas id="skuChart"></canvas></div></div>
                    <div class="bg-[#111419] rounded-[2.5rem] p-8 border border-white/5"><div class="h-64"><canvas id="drillChart"></canvas></div></div>
                </div>`;
            const skus = ['6mg', '10mg', '14mg', '17mg'];
            new Chart(document.getElementById('skuChart'), {
                type: 'bar',
                data: { labels: skus, datasets: [{ data: skus.map(s => parseFloat(getExcelVal(r, s)) || 0), backgroundColor: ['#10b981','#3b82f6','#f59e0b','#ef4444'], borderRadius: 12 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } } }
            });
            new Chart(document.getElementById('drillChart'), {
                type: 'bar',
                data: { labels: ['TGT', 'ACT'], datasets: [{ data: [target, actual], backgroundColor: ['#1e232d', '#10b981'], borderRadius: 15 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } } } }
            });
            lucide.createIcons();
        }

        function generateQR(bizId) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?bizid=${bizId}`;
            navigator.clipboard.writeText(shareUrl);
            alert("Retailer Access Link Copied to Clipboard!");
        }

        function checkRetailerAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const retailerId = urlParams.get('bizid');
            if (retailerId) {
                const checkData = setInterval(() => {
                    if (performanceData.length > 0) {
                        clearInterval(checkData);
                        renderRetailerOnlyView(retailerId);
                    }
                }, 500);
            }
        }

        function renderRetailerOnlyView(bizId) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('appHeader').style.display = 'none';
            document.getElementById('filterControls').style.display = 'none';
            openDrilldown(bizId);
            const modalHeader = document.getElementById('modalHeader');
            if(modalHeader) modalHeader.style.display = 'none';
            const qrBtn = document.getElementById('qrGenBtn');
            if(qrBtn) qrBtn.style.display = 'none';
            document.getElementById('modalBody').style.border = \"2px solid rgba(59, 130, 246, 0.5)\";
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function hideAll() { ['emptyState', 'territorySection', 'marketSection', 'shopSection'].forEach(id => document.getElementById(id).classList.add('hidden')); }
        function filterShops() {
            const term = document.getElementById('shopSearch').value.toLowerCase();
            Array.from(document.getElementById('shopList').children).forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'flex' : 'none');
        }
    </script>
</body>
</html>
