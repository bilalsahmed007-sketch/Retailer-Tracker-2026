<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive</title>
    
    <script src="data.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); background-attachment: fixed; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #1e232d; border: 1px solid #334155; border-radius: 1rem; padding: 1.15rem; width: 100%; outline: none; color: #f8fafc; }
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 md:p-10 pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8">Secure <span class="text-slate-500">Access</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest transition-all">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <header id="appHeader" class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-6">
            <h1 class="text-4xl md:text-5xl font-800 italic uppercase tracking-tighter text-white">Retailer <span class="text-slate-500">Intelligence</span></h1>
        </header>
        <main id="contentRoot">
            <div id="emptyState" class="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-[3rem]">
                <p class="text-slate-500 font-800 uppercase text-xs pulse">Initializing Data Stream...</p>
            </div>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[150] bg-[#0f1115]/98 backdrop-blur-xl hidden overflow-y-auto">
        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <div id="modalBody" class="bg-[#1a1d23] rounded-[3rem] p-8 md:p-16 border border-slate-800 shadow-2xl relative">
                <button onclick="closeModal()" class="absolute top-8 right-8 text-slate-500 hover:text-white">
                    <i data-lucide="x-circle"></i>
                </button>
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <script>
        let performanceData = [];

        window.onload = () => {
            lucide.createIcons();
            
            // 1. Map data from data.js
            if (typeof retailerData !== 'undefined') {
                performanceData = Object.keys(retailerData).map(id => ({
                    id: id,
                    name: retailerData[id].name,
                    target: retailerData[id].target || 0,
                    actual: retailerData[id].balance || 0
                }));
            }

            // 2. Check for URL Link Access
            const urlParams = new URLSearchParams(window.location.search);
            const bizId = urlParams.get('bizid');

            if (bizId) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                setTimeout(() => renderRetailerOnlyView(bizId), 300);
            }
        };

        function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "admin" && p === "51555777") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('emptyState').innerHTML = `<p class="text-slate-400">Welcome Admin. Use specific retailer links to view individual performance.</p>`;
            } else { alert("Access Denied"); }
        }

        function renderRetailerOnlyView(bizId) {
            const r = performanceData.find(i => String(i.id) === String(bizId));
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');

            if(!r) {
                document.getElementById('emptyState').innerHTML = `
                    <div class="text-center">
                        <p class="text-rose-500 font-800 mb-2">ERROR: ID ${bizId} NOT FOUND</p>
                        <p class="text-slate-600 text-xs">Verify the ID exists in your data.js file.</p>
                    </div>`;
                return;
            }

            modal.classList.remove('hidden');
            const gap = r.target - r.actual;
            
            content.innerHTML = `
                <div class="text-center mb-12">
                    <h2 class="text-4xl md:text-6xl font-800 text-white italic uppercase">${r.name}</h2>
                    <p class="text-blue-500 font-bold mt-4 tracking-widest">BIZOM ID: ${bizId}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-[#111419] p-8 rounded-[2rem] text-center border border-white/5">
                        <span class="text-[10px] text-slate-500 block uppercase font-bold mb-2">Monthly Target</span>
                        <p class="text-4xl font-800 text-white">${r.target.toLocaleString()}</p>
                    </div>
                    <div class="bg-[#111419] p-8 rounded-[2rem] text-center border border-white/5">
                        <span class="text-[10px] text-slate-500 block uppercase font-bold mb-2">Achieved</span>
                        <p class="text-4xl font-800 text-emerald-500">${r.actual.toLocaleString()}</p>
                    </div>
                    <div class="bg-[#111419] p-8 rounded-[2rem] text-center border border-white/5">
                        <span class="text-[10px] text-slate-500 block uppercase font-bold mb-2">Remaining Gap</span>
                        <p class="text-4xl font-800 ${gap <= 0 ? 'text-emerald-400' : 'text-rose-500'}">
                            ${gap <= 0 ? 'GOAL HIT' : gap.toLocaleString()}
                        </p>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }
    </script>
</body>
</html>
