<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); background-attachment: fixed; margin: 0; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #1e232d; border: 1px solid #334155; border-radius: 1rem; padding: 1.15rem; width: 100%; outline: none; color: #f8fafc; transition: all 0.2s; }
        .status-glow-red { border-left: 6px solid #ef4444 !important; box-shadow: -10px 0 20px -10px rgba(239, 68, 68, 0.2); }
        .status-glow-green { border-left: 6px solid #10b981 !important; box-shadow: -10px 0 20px -10px rgba(16, 185, 129, 0.2); }
        .white-card { background: #ffffff; color: #1a1d23; border-radius: 1.5rem; transition: all 0.3s ease; cursor: pointer; border: 1px solid transparent; }
        .white-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-10 pb-32">

    <div id="loadingState" class="fixed inset-0 z-[1000] bg-[#0f1115] flex items-center justify-center">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-slate-400 font-800 uppercase tracking-widest text-xs">Authenticating Cloud Intelligence...</p>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] hidden items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8 tracking-tighter">Secure <span class="text-slate-500">Access</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest transition-all">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <h1 class="text-4xl md:text-5xl font-800 italic uppercase tracking-tighter text-white">Retailer <span class="text-slate-500">Intelligence</span></h1>
                <p id="topDate" class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2"></p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div onclick="document.getElementById('fileInput').click()" class="glass px-6 py-4 rounded-2xl cursor-pointer flex-1 md:flex-none flex items-center justify-center gap-4 border border-white/5 transition-all hover:bg-white/5">
                    <i id="syncIcon" data-lucide="cloud-lightning" class="w-5 h-5 text-blue-400"></i>
                    <span id="syncText" class="text-xs font-bold uppercase text-blue-400 tracking-widest">Update Cloud</span>
                    <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
                </div>
                <button onclick="location.href=window.location.pathname" class="glass p-4 rounded-2xl text-rose-500 border border-rose-500/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-4 mb-8">
            <div class="relative">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 w-5 h-5"></i>
                <input type="text" id="globalSearch" oninput="handleGlobalSearch()" placeholder="GLOBAL SEARCH: SHOP NAME OR BIZOM ID..." 
                       class="input-field pl-12 font-800 text-[11px] tracking-widest uppercase">
            </div>
            <div id="adminFilters" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="regionSelect" onchange="updateAreas()" class="input-field font-bold uppercase text-xs">
                    <option value="">Select Region</option>
                    <option value="CPR">CPR</option><option value="NPR">NPR</option><option value="SPR">SPR</option><option value="S&B">S&B</option>
                </select>
                <select id="areaSelect" onchange="renderTerritoryView()" disabled class="input-field font-bold uppercase text-xs opacity-40">
                    <option value="">Select Area Cluster</option>
                </select>
            </div>
        </div>

        <main id="contentRoot">
            <div id="emptyState" class="h-64 flex items-center justify-center border-2 border-dashed border-slate-800 rounded-[3rem]">
                <p class="text-slate-700 font-800 uppercase text-xs tracking-widest">Awaiting Command</p>
            </div>
            <section id="territorySection" class="hidden"><div id="territoryGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
            <section id="marketSection" class="hidden">
                <button onclick="renderTerritoryView()" class="flex items-center gap-2 text-slate-500 font-bold uppercase text-[10px] mb-8 hover:text-white"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
                <div id="marketGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            </section>
            <section id="shopSection" class="hidden">
                <div class="flex justify-between items-center mb-8">
                    <button id="shopBackBtn" class="flex items-center gap-2 text-slate-500 font-bold uppercase text-[10px] hover:text-white"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back</button>
                    <span id="shopCount" class="text-[10px] font-800 text-blue-400 uppercase tracking-widest bg-blue-400/10 px-3 py-1 rounded-full"></span>
                </div>
                <div id="shopList" class="grid gap-4"></div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[150] bg-[#0f1115]/98 backdrop-blur-xl hidden overflow-y-auto">
        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <div class="flex justify-end mb-8"><button onclick="closeModal()" class="text-slate-400 font-800 text-[10px] tracking-widest uppercase hover:text-white">CLOSE <i data-lucide="circle-x" class="w-5 h-5 inline ml-2"></i></button></div>
            <div id="modalBody" class="bg-[#1a1d23] rounded-[3rem] p-8 md:p-16 border border-slate-800 shadow-2xl overflow-hidden"></div>
        </div>
    </div>

    <script>
        // CRITICAL CONFIGURATION
        const GIST_ID = "2f31d97be896afbdb99de57d7a2b8dfd";
        const GITHUB_TOKEN = "ghp_PASTE_YOUR_TOKEN_HERE"; // IMPORTANT: Add your token here
        
        window.performanceData = [];
        let currentTerritory = '';
        const hierarchyData = {"CPR":{"Lahore":{"Kasur":["Kasur"],"Mughalpura":["Lahore"],"Gulberg":["Lahore"],"DHA":["Lahore"],"Raiwind":["Lahore"],"Shahdara":["Shahdara"],"Samanabad":["Lahore"],"Islampura":["Lahore"],"Railway Station":["Lahore"],"Mall Road":["Lahore"],"Wall City":["Lahore"],"Model Town":["Lahore"],"Township":["Lahore"]},"Faisalabad":{"Jhang":["AP Sial","Jhang"],"Pensera":["AP Banglow","Bhowana","Pensera"],"Rabwah":["Rabwah"],"Faisalabad-A":["Faisalabad"],"Faisalabad-B":["Faisalabad"],"Faisalabad-C":["Faisalabad"],"Toba Tek Singh":["Gojra","Shorkot","Toba Tek Singh"],"Jaranwala":["Jaranwala"],"MoreKhunda":["MoreKhunda"],"Shahkot":["Shahkot"],"Samundri":["Mureedwala","Samundri","Tandlianwala"]},"Gujranwala":{"Sialkot":["Daska","Sialkot"],"Daska":["Daska","Pasrur","Sambrial"],"Narowal":["Narang Mandi","Narowal","Shakargarh","Zafarwal"],"Wazirabad":["Ali Pur Chattha","Qilla Didar Singh","Wazirabad"],"Gujranwala-A":["Gujranwala"],"Gujranwala-B":["Gujranwala","Gujranwala Cantt"],"Hafizabad":["Hafizabad","Nowshera Virkan","Pindi Bhattian"],"Sheikhupura":["Farooqabad","Khanqa Dogran","Sheikhupura"],"Kamoke":["Kamoke","Muridke"]}},"NPR":{"Islamabad":{"Chakwal":["Chakwal"],"Talagang":["Fateh Jang","Talagang"],"Murree":["Gujar Khan","Kahuta","Kallar","Murree"],"Islamabad West":["Islamabad"],"Islamabad Suburb":["Islamabad"],"Islamabad East":["Islamabad"],"Rawalpindi A":["Rawalpindi"],"Rawalpindi B":["Rawalpindi"],"Rawalpindi C":["Rawalpindi"]},"Jhelum":{"Gujrat":["Daulat Nagar","Gujrat","Jalalpur"],"Dinga":["Lalamusa","Phalia"],"Mirpur":["Islamghar","Mirpur"],"Mandibhaudin":["Khewra","Mandi Bahauddin","PDKhan","Pinanwal"],"Jhelum":["Jhelum"]},"Northern Area":{"Abbottabad":["Abbottabad","Haripur"],"Wah":["Attock","Taxila","Wah Cantt"],"Muzaffarabad":["Bagh","Muzaffarabad"],"Mansehra":["Balakot","Besham","Mansehra"],"Rawalakot":["F Kahutta","Hajeera","Rawalakot"],"Gilgit":["Gilgit","Skardu"],"Kotli":["Kotli","Plandri"]},"Peshawar":{"DI Khan":["Bannu","DIKhan","Wana"],"Minghora":["Batkhela","Chitral","Mingora","Timergara"],"Peshawar B":["Charsadda","Peshawar"],"Kohat":["Hangu","Karak","Kohat"],"Mardan":["Mardan","Nowshera","Swabi"],"Peshawar A":["Peshawar"]},"Sargodha":{"Bhalwal":["Bhalwal","Bhera","Kotmomin"],"Mianwali":["Isakhel","Mianwali","Quaidabad","Rangpur"],"Joharabad":["Khushab","Sillanwali"],"Sargodha A":["Sargodha"],"Sargodha B":["Sargodha"]}},"SPR":{"Bahawalpur":{"Khanbela":["AP East","Khanbela"],"Bahawalpur":["Bahawalpur"],"Chishtian":["Chishtian"],"Yazman":["Faqirwali","Yazman"],"Lodhran":["Jalalpur Pirwala","Lodhran"],"RYK":["Rahim Yar Khan"]},"DG Khan":{"Bhakkar":["Bhakkar"],"Layyah":["Layyah"],"Kot Addu":["Chowkmunda","Kot Addu","Taunsa"],"Rajanpur":["Fazilpur","Jampur","Rajanpur","Rojhan"],"Muzaffargarh":["Jatoi","Muzafargarh","Rohilanwali"],"DG Khan":["DG Khan","Kot Chutta","Sakhi Warwar"]},"Sukkur":{"Khairpur":["Choondko","Gambat","Khairpur Mirs","Pir Jo Goth"],"Jacobabad":["Dera Allah Yar","JACOBABAD","Kandhkot","Kandhkot","Kashmore","Usta Muhammad"],"Ghotki":["Ghotki","Mirpur Mathelo","Rohri","UBARO"],"Sukkur":["Shikarpur","Sukkur","Thull"]},"Sahiwal":{"Sahiwal":["Sahiwal"],"Arifwala":["Arifwala","Bahawalnagar"],"Chichawatni":["Chichawatni","Kamalia"],"Pakpattan":["Depalpur","Minchinabad","Pakpattan","Theeng More"],"Pattoki":["Pattoki","Theeng More"],"Okara":["Okara","Renala Khurd"]},"Multan":{"Burewala":["Burewala","Luddan"],"Dunyapur":["Dunyapur","Mailsi"],"Vehari":["Jahanian","Vehari"],"Kabirwala":["Kabirwala"],"Khanewal":["Khanewal"],"Multan":["Multan"],"Mian Channu":["Mianchanu","Pir Mahal"]}},"S&B":{"Hyderabad":{"Badin Territory":["Badin","Golrachi","Matli","Tando Muhammad Khan"],"Thar Territory":["Digri","Kunri","Naukot","Umerkot"],"Hyderabad Territory":["Hyderabad","Jamshoro","Kotri"],"Mirpurkhas Territory":["Khipro","Mirpurkhas","Tando Allahyar"],"Thatta Territory":["Nooriabad","Thatta"],"TandoAdam Territory":["SP Chakar","Saeedabad","Sanghar","Shahdadpur","Tando Adam"]},"Karachi":{"DHA":["Karachi"],"GIB":["Karachi"],"KBR":["Karachi"],"KRG":["Karachi"],"LDI":["Karachi"],"MLR":["Karachi"],"MTV":["Karachi"],"NKR":["Karachi"],"OLC":["Karachi"]},"Nawabshah":{"Naushero Territory":["Bhiria","Kandiaro","Mehrabpur","Moro","Naushero Feroze","Nawabshah","Qazi Ahmed"],"Dadu Territory":["Dadu","Khairpur Nathan Shah","Mehar","Sann","Sehwan"],"Nawabshah":["Daur","Nawabshah","Qazi Ahmed"],"Nawabshah Territory":["Nawabshah"],"Kamber Territory":["Kamber Ali khan","Naseerabad","Shahdad kot"],"Larkana Territory":["Larkana","Naudero","Ratodero"]},"Quetta":{"Coastal Territory":["Gwadar","Uthal"],"Khuzdar Territory":["Khuzdar","Mastung"],"Lorlai Territory":["Loralai","Qilla Saifullah","ZHOB"],"Quetta B Territory":["Pishin"],"Quetta A Territory":["Quetta"]}}};

        window.onload = async () => {
            document.getElementById('topDate').innerText = new Date().toDateString();
            await syncFromCloud();
            initFileUpload();
            handleBypass();
        };

        // FIXED CLOUD SYNC [cite: 27-28]
        async function syncFromCloud() {
            try {
                const headers = GITHUB_TOKEN.startsWith('ghp_') ? { 'Authorization': `token ${GITHUB_TOKEN}` } : {};
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`, { headers });
                
                if (!res.ok) throw new Error("Gist Error");
                
                const data = await res.json();
                window.performanceData = JSON.parse(data.files["data.json"].content);
                
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'flex';
                lucide.createIcons();
            } catch (e) {
                document.getElementById('loadingState').innerHTML = `<div class="text-rose-500 font-800 uppercase text-xs">Offline: Check Gist or Token</div>`;
            }
        }

        // SMART HELPERS [cite: 31-33, 76-77]
        function norm(s) { return String(s || "").toLowerCase().replace(/\s/g, '').trim(); }
        function getExcelVal(row, key) { 
            const target = norm(key);
            for (let k in row) { if (norm(k).includes(target)) return row[k]; }
            return 0;
        }
        function fmt(val) { return parseFloat(val || 0).toLocaleString('en-PK'); }

        // NAVIGATION LOGIC [cite: 79-87]
        function updateAreas() {
            const reg = document.getElementById('regionSelect').value;
            const areaSel = document.getElementById('areaSelect');
            areaSel.innerHTML = '<option value="">Select Area Cluster</option>';
            if(reg) {
                Object.keys(hierarchyData[reg]).sort().forEach(a => areaSel.innerHTML += `<option value="${a}">${a}</option>`);
                areaSel.disabled = false; areaSel.classList.remove('opacity-40');
            }
            hideAll(); document.getElementById('emptyState').classList.remove('hidden');
        }

        function renderTerritoryView() {
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            if(!reg || !area) return;
            const territories = Object.keys(hierarchyData[reg][area]).sort();
            hideAll(); document.getElementById('territorySection').classList.remove('hidden');
            document.getElementById('territoryGrid').innerHTML = territories.map(t => `
                <div onclick="showMarkets('${t}')" class="white-card p-10 h-44 flex flex-col justify-center text-center">
                    <h4 class="text-xl font-800 uppercase italic tracking-tighter">${t}</h4>
                </div>`).join('');
            lucide.createIcons();
        }

        function showMarkets(tName) {
            currentTerritory = tName;
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            const markets = hierarchyData[reg][area][tName].sort();
            hideAll(); document.getElementById('marketSection').classList.remove('hidden');
            document.getElementById('marketGrid').innerHTML = markets.map(m => `
                <div onclick="showShops('${m}')" class="white-card p-6 h-32 flex items-center justify-center text-center">
                    <h4 class="text-[10px] font-800 uppercase tracking-widest">${m}</h4>
                </div>`).join('');
            lucide.createIcons();
        }

        // EXECUTIVE SEARCH [cite: 58, 131]
        function handleGlobalSearch() {
            const term = document.getElementById('globalSearch').value.toLowerCase();
            if (term.length < 2) { 
                if (term.length === 0) { hideAll(); document.getElementById('emptyState').classList.remove('hidden'); }
                return; 
            }
            const results = window.performanceData.filter(r => 
                norm(getExcelVal(r, 'Shop Name')).includes(term) || 
                norm(getExcelVal(r, 'Bizom ID')).includes(term)
            );
            renderShopList(results, "GLOBAL SEARCH", true);
        }

        function showShops(mName) {
            const shops = window.performanceData.filter(r => norm(getExcelVal(r, 'Market')).includes(norm(mName)));
            renderShopList(shops, mName, false);
        }

        // SHOP RENDERER [cite: 91-105]
        function renderShopList(shops, title, isGlobal) {
            hideAll();
            document.getElementById('shopSection').classList.remove('hidden');
            document.getElementById('shopCount').innerText = `${shops.length} RETAILERS`;
            document.getElementById('shopBackBtn').onclick = isGlobal ? () => { document.getElementById('globalSearch').value=''; hideAll(); document.getElementById('emptyState').classList.remove('hidden'); } : () => showMarkets(currentTerritory);

            const daysRem = Math.max(1, new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate() - new Date().getDate());

            document.getElementById('shopList').innerHTML = shops.map(r => {
                const target = parseFloat(getExcelVal(r, 'Target')) || 0;
                const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
                const bizId = getExcelVal(r, 'Bizom ID');
                const isWinner = actual >= target && target > 0;
                const rrr = Math.max(0, (target - actual) / daysRem).toFixed(1);
                
                let sName = getExcelVal(r, 'Shop Name');
                if (norm(sName) === "0" || !sName) sName = "RETAILER #" + bizId;

                return `
                <div onclick="openDrilldown('${bizId}')" class="glass p-5 rounded-[2rem] flex flex-col md:flex-row justify-between items-start md:items-center cursor-pointer transition-all hover:scale-[1.01] hover:bg-white/5 ${isWinner ? 'status-glow-green' : 'status-glow-red'}">
                    <div class="flex-1">
                        <h4 class="text-xl font-800 text-white italic uppercase tracking-tighter mb-4">${sName}</h4>
                        <div class="flex flex-wrap gap-4">
                            <div class="bg-white/5 px-4 py-2 rounded-xl"><span class="text-[8px] text-slate-500 font-800 uppercase block">Target</span><span class="text-md font-800 text-white">${fmt(target)}</span></div>
                            <div class="bg-white/5 px-4 py-2 rounded-xl"><span class="text-[8px] text-slate-500 font-800 uppercase block">Actual</span><span class="text-md font-800 ${isWinner ? 'text-emerald-400' : 'text-rose-400'}">${fmt(actual)}</span></div>
                            <div class="bg-blue-500/10 px-4 py-2 rounded-xl"><span class="text-[8px] text-blue-400 font-800 uppercase block">Req /Day</span><span class="text-md font-800 text-blue-400">${fmt(rrr)}</span></div>
                        </div>
                    </div>
                    <div class="mt-4 md:mt-0 md:pl-6 md:border-l border-white/5 text-right">
                        <span class="text-[9px] font-800 text-slate-600 uppercase tracking-widest block">ID: ${bizId}</span>
                        <span class="text-[9px] font-800 text-slate-500 uppercase block">${getExcelVal(r, 'Market')}</span>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        // ANALYTICS DRILLDOWN [cite: 105-131]
        function openDrilldown(bizId) {
            const r = window.performanceData.find(i => String(getExcelVal(i, 'Bizom ID')) === String(bizId));
            if(!r) return;

            const target = parseFloat(getExcelVal(r, 'Target')) || 0;
            const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
            const payout = getExcelVal(r, 'Total Payout') || 0;

            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('modalBody').innerHTML = `
                <div class="text-center mb-10">
                    <h2 class="text-4xl font-800 text-white italic uppercase tracking-tighter mb-1">${getExcelVal(r, 'Shop Name')}</h2>
                    <p class="text-[10px] font-800 text-slate-500 uppercase tracking-widest">BIZOM: ${bizId} | MARKET: ${getExcelVal(r, 'Market')}</p>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
                    <div class="glass p-6 rounded-[2rem] text-center border border-white/5">
                        <span class="text-[9px] text-slate-500 font-800 uppercase block mb-1">Target</span>
                        <span class="text-2xl font-800 text-white">${fmt(target)}</span>
                    </div>
                    <div class="glass p-6 rounded-[2rem] text-center border border-white/5">
                        <span class="text-[9px] text-slate-500 font-800 uppercase block mb-1">Actual</span>
                        <span class="text-2xl font-800 text-emerald-400">${fmt(actual)}</span>
                    </div>
                    <div class="glass p-6 rounded-[2rem] text-center border border-white/5">
                        <span class="text-[9px] text-slate-500 font-800 uppercase block mb-1">Achievement</span>
                        <span class="text-2xl font-800 text-blue-400">${target>0?Math.round((actual/target)*100):0}%</span>
                    </div>
                    <div class="bg-blue-600 p-6 rounded-[2rem] text-center shadow-xl shadow-blue-900/20">
                        <span class="text-[9px] text-blue-100 font-800 uppercase block mb-1">Total Payout</span>
                        <span class="text-2xl font-800 text-white">Rs. ${fmt(payout)}</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass p-8 rounded-[2.5rem] h-80"><canvas id="drillChart"></canvas></div>
                    <div class="glass p-8 rounded-[2.5rem] h-80 flex flex-col items-center justify-center">
                        <div id="qr-code-space" class="p-4 bg-white rounded-2xl"></div>
                        <p class="text-[9px] font-800 text-slate-600 uppercase mt-4 tracking-widest">Retailer Access QR</p>
                    </div>
                </div>`;

            new QRCode(document.getElementById("qr-code-space"), { text: `${window.location.href.split('?')[0]}?id=${bizId}`, width: 140, height: 140 });

            new Chart(document.getElementById('drillChart').getContext('2d'), {
                type: 'bar',
                data: { labels: ['TARGET', 'ACTUAL'], datasets: [{ data: [target, actual], backgroundColor: ['rgba(255,255,255,0.05)', '#10b981'], borderRadius: 20, barThickness: 50 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
            lucide.createIcons();
        }

        // AUTH & UTILS [cite: 74-75, 132-133]
        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').classList.remove('flex');
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                lucide.createIcons();
            } else { alert("Access Denied"); }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function hideAll() { ['emptyState', 'territorySection', 'marketSection', 'shopSection'].forEach(id => document.getElementById(id).classList.add('hidden')); }

        function initFileUpload() {
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const workbook = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    const token = prompt("ENTER GITHUB TOKEN TO SYNC:");
                    if (!token) return;
                    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(jsonData, null, 2) } } })
                    });
                    if (res.ok) alert("SYNC SUCCESS"), location.reload();
                };
                reader.readAsArrayBuffer(e.target.files[0]);
            });
        }

        function handleBypass() {
            const rId = new URLSearchParams(window.location.search).get('id');
            if (rId) {
                const interval = setInterval(() => {
                    if (window.performanceData.length > 0) {
                        clearInterval(interval);
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('mainApp').classList.remove('hidden');
                        openDrilldown(rId);
                    }
                }, 100);
            }
        }
    </script>
</body>
</html>
