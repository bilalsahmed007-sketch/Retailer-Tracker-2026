<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive</title>
    
    <script src="data.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); background-attachment: fixed; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .white-card { background: #ffffff; color: #1a1d23; border-radius: 1.5rem; transition: all 0.3s ease; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .white-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); }
        .input-field { background: #1e232d; border: 1px solid #334155; border-radius: 1rem; padding: 1.15rem; width: 100%; outline: none; color: #f8fafc; }
        .status-glow-red { border-left: 6px solid #ef4444 !important; }
        .status-glow-green { border-left: 6px solid #10b981 !important; }
        .status-glow-yellow { border-left: 6px solid #f59e0b !important; }
    </style>
</head>
<body class="p-4 md:p-10 pb-32">
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8 tracking-tighter">Secure <span class="text-slate-500">Access</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest transition-all">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-6">
            <h1 class="text-4xl md:text-5xl font-800 italic uppercase tracking-tighter text-white">Retailer <span class="text-slate-500">Intelligence</span></h1>
        </header>
        <div id="filterControls" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            <select id="regionSelect" onchange="updateAreas()" class="input-field font-bold uppercase text-xs tracking-widest">
                <option value="">Select Region</option>
                <option value="CPR">CPR (Central)</option>
            </select>
            <select id="areaSelect" onchange="renderTerritoryView()" disabled class="input-field font-bold uppercase text-xs tracking-widest opacity-40">
                <option value="">Select Area Cluster</option>
            </select>
        </div>
        <main id="contentRoot">
            <div id="emptyState" class="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-[3rem]">
                <p class="text-slate-700 font-800 uppercase text-xs tracking-widest">Awaiting Selection</p>
            </div>
            <section id="territorySection" class="hidden"><div id="territoryGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
            <section id="marketSection" class="hidden"><div id="marketGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div></section>
            <section id="shopSection" class="hidden"><div id="shopList" class="grid gap-3"></div></section>
        </main>
    </div>

    <script>
        const GIST_ID = "1c566a18fa48fd05d3e65b560b0a6853";
        let performanceData = [];

        window.onload = async () => {
            await syncFromCloud();
            lucide.createIcons();
        };

        async function syncFromCloud() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`);
                if (res.ok) {
                    const data = await res.json();
                    performanceData = JSON.parse(data.files["data.json"].content);
                } else { throw new Error(); }
            } catch (e) {
                // FALLBACK TO DATA.JS
                if (typeof window.retailerData !== 'undefined') {
                    performanceData = Object.keys(window.retailerData).map(id => ({
                        'Bizom ID': id,
                        'Shop Name': window.retailerData[id].name,
                        'Target': window.retailerData[id].target,
                        'Total Sales': window.retailerData[id].balance,
                        'Market': 'Kasur' // Hardcoded to match your menu path
                    }));
                    console.log("Local Data Loaded");
                }
            }
        }

        function handleLogin() {
            const u = document.getElementById('userInput').value;
            const p = document.getElementById('passInput').value;
            if(u === "admin" && p === "51555777") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                lucide.createIcons();
            } else { alert("Access Denied"); }
        }

        function updateAreas() {
            const areaSel = document.getElementById('areaSelect');
            areaSel.innerHTML = '<option value="">Select Area Cluster</option><option value="Lahore">Lahore</option>';
            areaSel.disabled = false;
            areaSel.classList.remove('opacity-40');
        }

        function renderTerritoryView() {
            hideAll();
            document.getElementById('territorySection').classList.remove('hidden');
            document.getElementById('territoryGrid').innerHTML = `<div onclick="showMarkets('Kasur')" class="white-card p-10 text-center"><h4 class="text-xl font-800 uppercase italic">Kasur</h4></div>`;
        }

        function showMarkets(t) {
            hideAll();
            document.getElementById('marketSection').classList.remove('hidden');
            document.getElementById('marketGrid').innerHTML = `<div onclick="showShops('Kasur')" class="white-card p-6 text-center"><h4 class="text-[10px] font-800 uppercase">Kasur</h4></div>`;
        }

        function showShops(m) {
            hideAll();
            document.getElementById('shopSection').classList.remove('hidden');
            const filtered = performanceData.filter(r => r.Market === m);
            document.getElementById('shopList').innerHTML = filtered.map(r => `
                <div class="bg-white p-6 rounded-2xl flex justify-between items-center status-glow-green">
                    <h4 class="text-sm font-800 text-slate-900 uppercase italic">${r['Shop Name']}</h4>
                    <p class="text-xs font-bold text-slate-600">${r['Total Sales']} / ${r['Target']}</p>
                </div>`).join('');
        }

        function hideAll() { ['emptyState', 'territorySection', 'marketSection', 'shopSection'].forEach(id => document.getElementById(id).classList.add('hidden')); }
    </script>
</body>
</html>
