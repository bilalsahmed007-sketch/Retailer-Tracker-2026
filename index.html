<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Intelligence - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; margin: 0; }
        
        /* Initial States */
        #loader { position: fixed; inset: 0; z-index: 9999; background: #0f1115; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #loginScreen, #mainApp { display: none; }
        
        /* Bypass Logic CSS */
        html.retailer-mode #loginScreen { display: none !important; }
        html.retailer-mode #mainApp { display: block !important; }

        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.1); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        // IMMEDIATE ACTION
        const urlParams = new URLSearchParams(window.location.search);
        const rId = urlParams.get('id');
        if (rId) { document.documentElement.classList.add('retailer-mode'); }
    </script>
</head>
<body>

    <div id="loader"><div class="spinner"></div><p class="mt-4 text-[10px] font-800 tracking-widest text-blue-500 uppercase">Syncing Intelligence...</p></div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 text-center">
            <h2 class="text-3xl font-800 text-white italic mb-8 uppercase">Portal <span class="text-slate-500">Login</span></h2>
            <input type="text" id="userInput" placeholder="ID" class="w-full bg-[#1e232d] border border-slate-700 p-4 rounded-xl mb-4 outline-none">
            <input type="password" id="passInput" placeholder="Pass" class="w-full bg-[#1e232d] border border-slate-700 p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" class="w-full bg-blue-600 p-4 rounded-xl font-800 uppercase text-xs tracking-widest text-white">Authenticate</button>
        </div>
    </div>

    <div id="mainApp" class="max-w-6xl mx-auto p-4 md:p-10">
        <header id="adminHeader" class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-800 italic uppercase text-white">Retailer <span class="text-slate-500">Tracker</span></h1>
            <button onclick="document.getElementById('fileInput').click()" class="glass px-4 py-2 rounded-xl text-[10px] font-bold text-blue-400">SYNC LIVE DATA</button>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
        </header>

        <div id="bypassTarget"></div>

        <div id="adminSections">
            <div class="p-20 text-center border border-dashed border-slate-800 rounded-[2rem] text-slate-700 font-bold uppercase text-xs">Select Region to View Analytics</div>
        </div>
    </div>

    <script>
        const GIST_ID = "2f31d97be896afbdb99de57d7a2b8dfd";
        window.performanceData = [];

        window.onload = async () => {
            await fetchCloudData();
            document.getElementById('loader').style.display = 'none';

            const params = new URLSearchParams(window.location.search);
            const retailerId = params.get('id');

            if (retailerId) {
                // FORCE SHOW APP
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('adminHeader').style.display = 'none';
                document.getElementById('adminSections').style.display = 'none';
                renderRetailerCard(retailerId);
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
            }
        };

        async function fetchCloudData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
                const data = await res.json();
                window.performanceData = JSON.parse(data.files["data.json"].content);
            } catch (e) { console.error("Cloud Error"); }
        }

        function getVal(row, key) {
            const match = Object.keys(row).find(k => k.toLowerCase().replace(/\s/g,'').includes(key.toLowerCase()));
            return match ? row[match] : 0;
        }

        function renderRetailerCard(id) {
            const r = window.performanceData.find(x => String(getVal(x, 'Bizom ID')).trim() === String(id).trim());
            const targetDiv = document.getElementById('bypassTarget');

            if (!r) {
                targetDiv.innerHTML = `<div class="p-20 text-center glass rounded-[2rem] border-rose-500/30"><h2 class="text-rose-500 font-800 uppercase">Retailer ID ${id} Not Found</h2><p class="text-slate-500 mt-2">Please ensure the ID is correct in the Excel file.</p></div>`;
                return;
            }

            const target = parseFloat(getVal(r, 'Target')) || 0;
            const actual = parseFloat(getVal(r, 'Total Sales')) || 0;

            targetDiv.innerHTML = `
                <div class="space-y-6 max-w-2xl mx-auto">
                    <div class="text-center mb-10">
                        <h2 class="text-4xl font-800 text-white italic uppercase tracking-tighter">${getVal(r, 'Shop Name')}</h2>
                        <span class="inline-block mt-2 px-4 py-1 bg-blue-500/10 text-blue-400 text-[10px] font-800 rounded-full tracking-widest">BIZOM ID: ${id}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass p-8 rounded-[2.5rem] text-center border-b-4 border-blue-500">
                            <p class="text-[10px] font-800 text-slate-500 uppercase mb-1">Target</p>
                            <span class="text-3xl font-800 text-white">${target}</span>
                        </div>
                        <div class="glass p-8 rounded-[2.5rem] text-center border-b-4 border-emerald-500">
                            <p class="text-[10px] font-800 text-slate-500 uppercase mb-1">Achieved</p>
                            <span class="text-3xl font-800 text-emerald-400">${actual}</span>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-indigo-600 to-blue-700 p-8 rounded-[2.5rem] text-center shadow-2xl">
                        <p class="text-[10px] font-800 text-white/50 uppercase mb-1">Monthly Payout</p>
                        <span class="text-4xl font-800 text-white">Rs. ${getVal(r, 'Total Payout') || 0}</span>
                    </div>

                    <div class="glass p-6 rounded-[2.5rem] h-64">
                        <canvas id="miniChart"></canvas>
                    </div>
                </div>
            `;

            new Chart(document.getElementById('miniChart'), {
                type: 'bar',
                data: {
                    labels: ['Target', 'Actual'],
                    datasets: [{
                        data: [target, actual],
                        backgroundColor: ['rgba(255,255,255,0.1)', '#10b981'],
                        borderRadius: 15
                    }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }
                }
            });
        }

        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').remove();
                document.getElementById('mainApp').style.display = 'block';
            } else { alert("Invalid Credentials"); }
        }
    </script>
</body>
</html>
