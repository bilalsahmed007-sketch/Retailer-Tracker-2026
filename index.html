<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); background-attachment: fixed; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #1e232d; border: 1px solid #334155; border-radius: 1rem; padding: 1.15rem; width: 100%; outline: none; color: #f8fafc; }
        .status-glow-red { border-left: 6px solid #ef4444 !important; box-shadow: -10px 0 20px -10px rgba(239, 68, 68, 0.2); }
        .status-glow-green { border-left: 6px solid #10b981 !important; box-shadow: -10px 0 20px -10px rgba(16, 185, 129, 0.2); }
        #qr-code-space { background: white; padding: 10px; border-radius: 10px; display: inline-block; }
        .white-card { background: #ffffff; color: #1a1d23; border-radius: 1.5rem; transition: all 0.3s ease; cursor: pointer; }
        .white-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="p-4 md:p-10 pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8 tracking-tighter">Secure <span class="text-slate-500">Access</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest transition-all">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-16">
            <div>
                <h1 class="text-4xl md:text-5xl font-800 italic uppercase tracking-tighter text-white">Retailer <span class="text-slate-500">Intelligence</span></h1>
                <p id="topDate" class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-2"></p>
            </div>
            <div class="flex items-center gap-3">
                <div id="syncBtnContainer" onclick="document.getElementById('fileInput').click()" class="glass px-6 py-4 rounded-2xl cursor-pointer flex items-center gap-4 border border-white/5 transition-all">
                    <i id="syncIcon" data-lucide="refresh-ccw" class="w-5 h-5 text-blue-400"></i>
                    <span id="syncText" class="text-xs font-bold uppercase text-blue-400 tracking-widest">Sync Dataset</span>
                    <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
                </div>
                <button onclick="location.href=window.location.pathname" class="glass p-4 rounded-2xl text-rose-500 border border-rose-500/20" title="Logout"><i data-lucide="power" class="w-5 h-5"></i></button>
            </div>
        </header>

        <div id="adminFilters" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12">
            <select id="regionSelect" onchange="updateAreas()" class="input-field font-bold uppercase text-xs">
                <option value="">Select Region</option>
                <option value="CPR">CPR</option><option value="NPR">NPR</option><option value="SPR">SPR</option><option value="S&B">S&B</option>
            </select>
            <select id="areaSelect" onchange="renderTerritoryView()" disabled class="input-field font-bold uppercase text-xs opacity-40">
                <option value="">Select Area Cluster</option>
            </select>
        </div>

        <main id="contentRoot">
            <div id="emptyState" class="h-64 flex items-center justify-center border-2 border-dashed border-slate-800 rounded-[3rem]">
                <p class="text-slate-700 font-800 uppercase text-xs tracking-widest">Awaiting Selection</p>
            </div>
            <section id="territorySection" class="hidden"><div id="territoryGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div></section>
            <section id="marketSection" class="hidden">
                <button onclick="renderTerritoryView()" class="flex items-center gap-2 text-slate-500 font-bold uppercase text-[10px] mb-8 hover:text-white"><i data-lucide="chevron-left" class="w-4 h-4"></i> Back</button>
                <div id="marketGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
            </section>
            <section id="shopSection" class="hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <button onclick="showMarkets(currentTerritory)" class="flex items-center gap-2 text-slate-500 font-bold uppercase text-[10px] hover:text-white"><i data-lucide="chevron-left" class="w-4 h-4"></i> Back</button>
                    <input type="text" id="shopSearch" oninput="filterShops()" placeholder="SEARCH SHOP..." class="glass px-6 py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest outline-none border-none w-full md:w-64 text-white">
                </div>
                <div id="shopList" class="grid gap-3"></div>
            </section>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[150] bg-[#0f1115]/98 backdrop-blur-xl hidden overflow-y-auto">
        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <div id="modalCloseContainer" class="flex justify-end mb-8"><button onclick="closeModal()" class="text-slate-400 font-bold text-xs uppercase">CLOSE <i data-lucide="x" class="w-5 h-5 inline"></i></button></div>
            <div id="modalBody" class="bg-[#1a1d23] rounded-[3rem] p-8 md:p-16 border border-slate-800 shadow-2xl"></div>
        </div>
    </div>

    <script>
        const GIST_ID = "2f31d97be896afbdb99de57d7a2b8dfd";
        window.performanceData = [];
        let currentTerritory = '';

        const hierarchyData = {"CPR":{"Lahore":{"Kasur":["Kasur"],"Mughalpura":["Lahore"],"Gulberg":["Lahore"],"DHA":["Lahore"],"Raiwind":["Lahore"],"Shahdara":["Shahdara"],"Samanabad":["Lahore"],"Islampura":["Lahore"],"Railway Station":["Lahore"],"Mall Road":["Lahore"],"Wall City":["Lahore"],"Model Town":["Lahore"],"Township":["Lahore"]},"Faisalabad":{"Jhang":["AP Sial","Jhang"],"Pensera":["AP Banglow","Bhowana","Pensera"],"Rabwah":["Rabwah"],"Faisalabad-A":["Faisalabad"],"Faisalabad-B":["Faisalabad"],"Faisalabad-C":["Faisalabad"],"Toba Tek Singh":["Gojra","Shorkot","Toba Tek Singh"],"Jaranwala":["Jaranwala"],"MoreKhunda":["MoreKhunda"],"Shahkot":["Shahkot"],"Samundri":["Mureedwala","Samundri","Tandlianwala"]},"Gujranwala":{"Sialkot":["Daska","Sialkot"],"Daska":["Daska","Pasrur","Sambrial"],"Narowal":["Narang Mandi","Narowal","Shakargarh","Zafarwal"],"Wazirabad":["Ali Pur Chattha","Qilla Didar Singh","Wazirabad"],"Gujranwala-A":["Gujranwala"],"Gujranwala-B":["Gujranwala","Gujranwala Cantt"],"Hafizabad":["Hafizabad","Nowshera Virkan","Pindi Bhattian"],"Sheikhupura":["Farooqabad","Khanqa Dogran","Sheikhupura"],"Kamoke":["Kamoke","Muridke"]}},"NPR":{"Islamabad":{"Chakwal":["Chakwal"],"Talagang":["Fateh Jang","Talagang"],"Murree":["Gujar Khan","Kahuta","Kallar","Murree"],"Islamabad West":["Islamabad"],"Islamabad Suburb":["Islamabad"],"Islamabad East":["Islamabad"],"Rawalpindi A":["Rawalpindi"],"Rawalpindi B":["Rawalpindi"],"Rawalpindi C":["Rawalpindi"]},"Jhelum":{"Gujrat":["Daulat Nagar","Gujrat","Jalalpur"],"Dinga":["Lalamusa","Phalia"],"Mirpur":["Islamghar","Mirpur"],"Mandibhaudin":["Khewra","Mandi Bahauddin","PDKhan","Pinanwal"],"Jhelum":["Jhelum"]},"Northern Area":{"Abbottabad":["Abbottabad","Haripur"],"Wah":["Attock","Taxila","Wah Cantt"],"Muzaffarabad":["Bagh","Muzaffarabad"],"Mansehra":["Balakot","Besham","Mansehra"],"Rawalakot":["F Kahutta","Hajeera","Rawalakot"],"Gilgit":["Gilgit","Skardu"],"Kotli":["Kotli","Plandri"]},"Peshawar":{"DI Khan":["Bannu","DIKhan","Wana"],"Minghora":["Batkhela","Chitral","Mingora","Timergara"],"Peshawar B":["Charsadda","Peshawar"],"Kohat":["Hangu","Karak","Kohat"],"Mardan":["Mardan","Nowshera","Swabi"],"Peshawar A":["Peshawar"]},"Sargodha":{"Bhalwal":["Bhalwal","Bhera","Kotmomin"],"Mianwali":["Isakhel","Mianwali","Quaidabad","Rangpur"],"Joharabad":["Khushab","Sillanwali"],"Sargodha A":["Sargodha"],"Sargodha B":["Sargodha"]}},"SPR":{"Bahawalpur":{"Khanbela":["AP East","Khanbela"],"Bahawalpur":["Bahawalpur"],"Chishtian":["Chishtian"],"Yazman":["Faqirwali","Yazman"],"Lodhran":["Jalalpur Pirwala","Lodhran"],"RYK":["Rahim Yar Khan"]},"DG Khan":{"Bhakkar":["Bhakkar"],"Layyah":["Layyah"],"Kot Addu":["Chowkmunda","Kot Addu","Taunsa"],"Rajanpur":["Fazilpur","Jampur","Rajanpur","Rojhan"],"Muzaffargarh":["Jatoi","Muzafargarh","Rohilanwali"],"DG Khan":["DG Khan","Kot Chutta","Sakhi Sarwar"]},"Sukkur":{"Khairpur":["Choondko","Gambat","Khairpur Mirs","Pir Jo Goth"],"Jacobabad":["Dera Allah Yar","JACOBABAD","Kandhkot","Kandhkot","Kashmore","Usta Muhammad"],"Ghotki":["Ghotki","Mirpur Mathelo","Rohri","UBARO"],"Sukkur":["Shikarpur","Sukkur","Thull"]},"Sahiwal":{"Sahiwal":["Sahiwal"],"Arifwala":["Arifwala","Bahawalnagar"],"Chichawatni":["Chichawatni","Kamalia"],"Pakpattan":["Depalpur","Minchinabad","Pakpattan","Theeng More"],"Pattoki":["Pattoki","Theeng More"],"Okara":["Okara","Renala Khurd"]},"Multan":{"Burewala":["Burewala","Luddan"],"Dunyapur":["Dunyapur","Mailsi"],"Vehari":["Jahanian","Vehari"],"Kabirwala":["Kabirwala"],"Khanewal":["Khanewal"],"Multan":["Multan"],"Mian Channu":["Mianchanu","Pir Mahal"]}},"S&B":{"Hyderabad":{"Badin Territory":["Badin","Golrachi","Matli","Tando Muhammad Khan"],"Thar Territory":["Digri","Kunri","Naukot","Umerkot"],"Hyderabad Territory":["Hyderabad","Jamshoro","Kotri"],"Mirpurkhas Territory":["Khipro","Mirpurkhas","Tando Allahyar"],"Thatta Territory":["Nooriabad","Thatta"],"TandoAdam Territory":["SP Chakar","Saeedabad","Sanghar","Shahdadpur","Tando Adam"]},"Karachi":{"DHA":["Karachi"],"GIB":["Karachi"],"KBR":["Karachi"],"KRG":["Karachi"],"LDI":["Karachi"],"MLR":["Karachi"],"MTV":["Karachi"],"NKR":["Karachi"],"OLC":["Karachi"]},"Nawabshah":{"Naushero Territory":["Bhiria","Kandiaro","Mehrabpur","Moro","Naushero Feroze","Nawabshah","Qazi Ahmed"],"Dadu Territory":["Dadu","Khairpur Nathan Shah","Mehar","Sann","Sehwan"],"Nawabshah":["Daur","Nawabshah","Qazi Ahmed"],"Nawabshah Territory":["Nawabshah"],"Kamber Territory":["Kamber Ali khan","Naseerabad","Shahdad kot"],"Larkana Territory":["Larkana","Naudero","Ratodero"]},"Quetta":{"Coastal Territory":["Gwadar","Uthal"],"Khuzdar Territory":["Khuzdar","Mastung"],"Lorlai Territory":["Loralai","Qilla Saifullah","ZHOB"],"Quetta B Territory":["Pishin"],"Quetta A Territory":["Quetta"]}}};

        window.onload = async () => {
            document.getElementById('topDate').innerText = new Date().toDateString();
            await syncFromCloud();
            lucide.createIcons();
            initSyncLogic();
        };

        async function syncFromCloud() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`);
                const data = await res.json();
                window.performanceData = JSON.parse(data.files["data.json"].content);
            } catch (e) { console.error("Initial Load Error"); }
        }

        function initSyncLogic() {
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async function(ev) {
                    try {
                        const workbook = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                        const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        const token = prompt("File Ready. Enter GitHub Token:");
                        if (!token) return;
                        const response = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                            method: 'PATCH',
                            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(jsonData, null, 2) } } })
                        });
                        if (response.ok) {
                            const btn = document.getElementById('syncBtnContainer');
                            btn.style.borderColor = "#10b981"; 
                            btn.style.background = "rgba(16, 185, 129, 0.1)";
                            document.getElementById('syncText').innerText = "Cloud Synced";
                            document.getElementById('syncText').style.color = "#10b981";
                            document.getElementById('syncIcon').setAttribute('data-lucide', 'check-circle-2');
                            document.getElementById('syncIcon').style.color = "#10b981";
                            window.performanceData = jsonData;
                            lucide.createIcons();
                            alert("✅ Sync Success");
                        }
                    } catch (err) { alert("Error: " + err.message); }
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                lucide.createIcons();
            } else { alert("Invalid Credentials"); }
        }

        function norm(s) { return String(s || "").toLowerCase().replace(/\s/g, '').trim(); }
        function getExcelVal(row, key) { const target = norm(key); for (let k in row) { if (norm(k).includes(target)) return row[k]; } return 0; }

        function updateAreas() {
            const reg = document.getElementById('regionSelect').value;
            const areaSel = document.getElementById('areaSelect');
            areaSel.innerHTML = '<option value="">Select Area Cluster</option>';
            if(reg) {
                Object.keys(hierarchyData[reg]).sort().forEach(a => areaSel.innerHTML += `<option value="${a}">${a}</option>`);
                areaSel.disabled = false; areaSel.classList.remove('opacity-40');
            }
            hideAll(); document.getElementById('emptyState').classList.remove('hidden');
        }

        function renderTerritoryView() {
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            if(!reg || !area) return;
            const territories = Object.keys(hierarchyData[reg][area]).sort();
            hideAll(); document.getElementById('territorySection').classList.remove('hidden');
            document.getElementById('territoryGrid').innerHTML = territories.map(t => `<div onclick="showMarkets('${t}')" class="white-card p-10 h-44 flex flex-col justify-center text-center"><h4 class="text-xl font-800 uppercase italic">${t}</h4></div>`).join('');
        }

        function showMarkets(tName) {
            currentTerritory = tName;
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            const markets = hierarchyData[reg][area][tName].sort();
            hideAll(); document.getElementById('marketSection').classList.remove('hidden');
            document.getElementById('marketGrid').innerHTML = markets.map(m => `<div onclick="showShops('${m}')" class="white-card p-6 h-32 flex items-center justify-center text-center"><h4 class="text-[10px] font-800 uppercase tracking-widest">${m}</h4></div>`).join('');
        }

        function showShops(mName) {
            hideAll();
            document.getElementById('shopSection').classList.remove('hidden');
            const shops = window.performanceData.filter(r => norm(getExcelVal(r, 'Market')).includes(norm(mName)));
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daysRemaining = Math.max(1, daysInMonth - now.getDate());
            document.getElementById('shopList').innerHTML = shops.map(r => {
                const target = parseFloat(getExcelVal(r, 'Target')) || 0;
                const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
                const bizId = getExcelVal(r, 'Bizom ID');
                const rrr = Math.max(0, (target - actual) / daysRemaining).toFixed(1);
                const isWinner = actual >= target && target > 0;
                const rawName = getExcelVal(r, 'Shop Name');
                const cleanStr = String(rawName || "").trim();
                const finalShopTitle = (cleanStr !== "0" && cleanStr !== "") ? rawName : "RETAILER";
                return `
                <div onclick="openDrilldown('${bizId}')" class="glass group relative p-5 rounded-[2rem] flex justify-between items-center cursor-pointer mb-4 transition-all duration-300 hover:scale-[1.01] hover:bg-white/5 ${isWinner ? 'status-glow-green' : 'status-glow-red'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="p-2 bg-indigo-500/10 rounded-lg"><i data-lucide="tag" class="w-4 h-4 text-indigo-400"></i></div>
                            <h4 class="text-xl font-800 text-white italic uppercase tracking-tighter">${finalShopTitle}</h4>
                        </div>
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                                <span class="text-[9px] text-slate-500 font-800 uppercase block mb-1">Target</span>
                                <div class="flex items-center gap-2"><i data-lucide="target" class="w-3 h-3 text-slate-400"></i><span class="text-lg font-800 text-white">${target}</span></div>
                            </div>
                            <div class="bg-white/5 px-4 py-2 rounded-xl border border-white/5">
                                <span class="text-[9px] text-slate-500 font-800 uppercase block mb-1">Actual</span>
                                <div class="flex items-center gap-2"><i data-lucide="trending-up" class="w-3 h-3 ${isWinner ? 'text-emerald-400' : 'text-rose-400'}"></i><span class="text-lg font-800 ${isWinner ? 'text-emerald-400' : 'text-rose-400'}">${actual}</span></div>
                            </div>
                            <div class="bg-blue-500/10 px-4 py-2 rounded-xl border border-blue-500/20">
                                <span class="text-[9px] text-blue-400 font-800 uppercase block mb-1">Req. Run Rate</span>
                                <div class="flex items-center gap-2"><i data-lucide="zap" class="w-3 h-3 text-blue-400 animate-pulse"></i><span class="text-lg font-800 text-blue-400">${rrr} <small class="text-[10px] opacity-50">/DAY</small></span></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-center justify-center gap-2 min-w-[100px] border-l border-white/5 ml-4 pl-4">
                        <div class="relative">
                            <div class="absolute inset-0 bg-indigo-500/20 blur-xl rounded-full"></div>
                            <div class="relative p-3 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl shadow-lg shadow-indigo-500/20"><i data-lucide="shopping-cart" class="w-6 h-6 text-white"></i></div>
                        </div>
                        <div class="flex items-center gap-1"><span class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">Retailer ID: ${bizId}</span>${isWinner ? '<i data-lucide="trophy" class="w-3 h-3 text-amber-400"></i>' : ''}</div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openDrilldown(bizId) {
            const r = window.performanceData.find(i => String(getExcelVal(i, 'Bizom ID')) === String(bizId));
            if(!r) return;
            const currentBizId = getExcelVal(r, 'Bizom ID');
            const target = parseFloat(getExcelVal(r, 'Target')) || 0;
            const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
            const rawName = getExcelVal(r, 'Shop Name');
            const cleanStr = String(rawName || "").trim();
            const finalTitle = (cleanStr !== "0" && cleanStr !== "") ? rawName : "RETAILER";
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daysRemaining = Math.max(1, lastDay - now.getDate());
            const rrr = Math.max(0, (target - actual) / daysRemaining).toFixed(1);
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('modalBody').innerHTML = `
                <div class="text-center mb-8">
                    <h2 class="text-3xl md:text-5xl font-800 text-white italic uppercase mb-2 tracking-tighter">${finalTitle}</h2>
                    <div class="text-[10px] font-800 text-slate-500 uppercase tracking-[0.3em] mb-6">Retailer ID: ${currentBizId}</div>
                    <div id="qr-code-space" class="inline-block p-2 bg-white rounded-2xl shadow-2xl mb-4"></div>
                </div>
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                    <div class="glass p-5 rounded-[2rem] border border-white/5">
                        <div class="flex items-center gap-2 mb-1"><i data-lucide="target" class="w-3 h-3 text-slate-500"></i><span class="text-[9px] text-slate-500 uppercase font-800">Target</span></div>
                        <span class="text-2xl font-800 text-white">${target}</span>
                    </div>
                    <div class="glass p-5 rounded-[2rem] border border-white/5">
                        <div class="flex items-center gap-2 mb-1"><i data-lucide="trending-up" class="w-3 h-3 text-emerald-500"></i><span class="text-[9px] text-slate-500 uppercase font-800">Actual</span></div>
                        <span class="text-2xl font-800 text-emerald-500">${actual}</span>
                    </div>
                    <div class="glass p-5 rounded-[2rem] border border-white/5">
                        <div class="flex items-center gap-2 mb-1"><i data-lucide="alert-circle" class="w-3 h-3 text-rose-500"></i><span class="text-[9px] text-slate-500 uppercase font-800">Deficit</span></div>
                        <span class="text-2xl font-800 text-rose-500">${Math.max(0, (target-actual)).toFixed(0)}</span>
                    </div>
                    <div class="glass p-5 rounded-[2rem] border border-white/5">
                        <div class="flex items-center gap-2 mb-1"><i data-lucide="wallet" class="w-3 h-3 text-blue-400"></i><span class="text-[9px] text-slate-500 uppercase font-800">Payout</span></div>
                        <span class="text-2xl font-800 text-blue-400">${getExcelVal(r,'Total Payout') || 0}</span>
                    </div>
                </div>
                <div class="bg-blue-500/10 border border-blue-500/20 p-5 rounded-[1.5rem] mb-10 flex justify-between items-center">
                    <div class="flex items-center gap-3"><div class="p-2 bg-blue-500/20 rounded-lg animate-pulse"><i data-lucide="zap" class="w-5 h-5 text-blue-400"></i></div><span class="text-xs font-800 text-blue-400 uppercase tracking-widest">Required Run Rate</span></div>
                    <span class="text-2xl font-800 text-blue-400">${rrr} <small class="text-[10px] opacity-60">/ DAY</small></span>
                </div>
                <div class="space-y-10">
                    <div class="relative h-72 glass p-6 rounded-[2.5rem] border border-white/5"><h3 class="text-[10px] font-800 text-slate-500 uppercase tracking-widest mb-4">Performance Gap Analysis</h3><div class="h-48"><canvas id="drillChart"></canvas></div></div>
                    <div class="relative h-72 glass p-6 rounded-[2.5rem] border border-white/5"><h3 class="text-[10px] font-800 text-slate-500 uppercase tracking-widest mb-4">Brand Contribution</h3><div class="h-48"><canvas id="brandChart"></canvas></div></div>
                </div>`;
            new QRCode(document.getElementById("qr-code-space"), { text: `${window.location.href.split('?')[0]}?id=${currentBizId}`, width: 110, height: 110 });
            const chartOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.03)', drawBorder: false }, ticks: { color: '#64748b', font: { size: 10, weight: '800' } } }, x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10, weight: '800' } } } } };
            new Chart(document.getElementById('drillChart'), { type: 'bar', data: { labels: ['TARGET', 'ACTUAL'], datasets: [{ data: [target, actual], backgroundColor: ['rgba(255,255,255,0.05)', '#10b981'], borderRadius: 20, barThickness: 40 }] }, options: chartOptions });
            new Chart(document.getElementById('brandChart'), { type: 'bar', data: { labels: ['6mg','10mg','14mg','17mg'], datasets: [{ data: [getExcelVal(r,'6mg'),getExcelVal(r,'10mg'),getExcelVal(r,'14mg'),getExcelVal(r,'17mg')], backgroundColor: ['#10b981','#3b82f6','#f59e0b','#ef4444'], borderRadius: 12, barThickness: 30 }] }, options: chartOptions });
            lucide.createIcons();
        }

        function filterShops() {
            const term = document.getElementById('shopSearch').value.toLowerCase();
            Array.from(document.getElementById('shopList').children).forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'flex' : 'none');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function hideAll() { ['emptyState', 'territorySection', 'marketSection', 'shopSection'].forEach(id => document.getElementById(id).classList.add('hidden')); }

        // --- BYPASS ENGINE (REWRITTEN TO PREVENT BLANK PAGE) ---
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const rId = urlParams.get('id');
            
            // 1. Hide login screen immediately if ID is present
            if (rId) {
                document.getElementById('loginScreen').style.display = 'none';
            }

            const qrInterval = setInterval(() => {
                if (rId && window.performanceData && window.performanceData.length > 0) {
                    clearInterval(qrInterval);
                    
                    // 2. Check if the ID exists in the data
                    const exists = window.performanceData.some(r => String(getExcelVal(r, 'Bizom ID')) === String(rId));
                    
                    if (exists) {
                        document.getElementById('mainApp').classList.remove('hidden');
                        openDrilldown(rId);
                        document.getElementById('syncBtnContainer').style.display = 'none';
                        document.getElementById('adminFilters').style.display = 'none';
                    } else {
                        // 3. SHOW ERROR IF ID NOT FOUND
                        document.getElementById('mainApp').classList.remove('hidden');
                        document.getElementById('contentRoot').innerHTML = `
                            <div class="p-20 text-center glass rounded-[2rem]">
                                <h2 class="text-rose-500 font-800 uppercase">Retailer Not Found</h2>
                                <p class="text-slate-500 mt-2 tracking-widest text-[10px] font-bold">ID: ${rId} IS NOT IN THE DATASET.</p>
                            </div>`;
                    }
                }
            }, 500);
        })();
    </script>
</body>
</html>
