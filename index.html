<div id="syncBtnContainer" onclick="refreshData()" class="glass px-6 py-4 rounded-2xl flex items-center gap-4 border border-white/5 transition-all cursor-pointer hover:bg-white/10 active:scale-95">
    <i id="syncIcon" data-lucide="refresh-cw" class="w-5 h-5 text-blue-400"></i>
    <span id="syncText" class="text-xs font-bold uppercase tracking-wider text-blue-400">Refresh Data</span>
</div>

<script>
    let performanceData = [];

    // This function handles the "Data Connected" button action
    function refreshData() {
        const icon = document.getElementById('syncIcon');
        const text = document.getElementById('syncText');
        const container = document.getElementById('syncBtnContainer');

        // Start Animation
        icon.classList.add('animate-spin');
        text.innerText = "Syncing...";

        // Logic to pull from data.js
        if (typeof retailerData !== 'undefined') {
            performanceData = Object.keys(retailerData).map(id => ({
                'Bizom ID': id,
                'Shop Name': retailerData[id].name,
                'Target': retailerData[id].target,
                'Total Sales': retailerData[id].balance, 
                '6mg': retailerData[id]['6mg'],
                '10mg': retailerData[id]['10mg'],
                '14mg': retailerData[id]['14mg'],
                '17mg': retailerData[id]['17mg']
            }));

            // Success Visual Feedback
            setTimeout(() => {
                icon.classList.remove('animate-spin');
                text.innerText = "Data Connected";
                container.classList.add('bg-emerald-500/10', 'border-emerald-500/20');
                text.classList.replace('text-blue-400', 'text-emerald-400');
                icon.classList.replace('text-blue-400', 'text-emerald-400');
                
                // If you are looking at the shop list, refresh it automatically
                if(!document.getElementById('shopSection').classList.contains('hidden')) {
                    showShops();
                }
            }, 800);
        } else {
            alert("Error: data.js file not found or retailerData variable missing.");
        }
    }

    // Update your window.onload to use this new function
    window.onload = () => {
        // ... (Keep your existing date logic) ...
        refreshData(); 
        lucide.createIcons();
        checkRetailerAccess();
    };
    
    // ... (Keep the rest of your functions same) ...
</script>
