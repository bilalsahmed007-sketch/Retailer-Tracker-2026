<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive</title>
    
    <script src="data.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); background-attachment: fixed; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); }
        .white-card { background: #ffffff; color: #1a1d23; border-radius: 1.5rem; transition: all 0.3s ease; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .white-card:hover { transform: translateY(-5px); }
        .input-field { background: #1e232d; border: 1px solid #334155; border-radius: 1rem; padding: 1.15rem; width: 100%; outline: none; color: #f8fafc; }
        .status-glow-red { border-left: 6px solid #ef4444 !important; }
        .status-glow-green { border-left: 6px solid #10b981 !important; }
        .status-glow-yellow { border-left: 6px solid #f59e0b !important; }
    </style>
</head>
<body class="p-4 md:p-10 pb-32">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8">Secure <span class="text-slate-500">Access</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest">Authenticate</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-6xl mx-auto">
        <header id="appHeader" class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-6">
            <h1 class="text-4xl md:text-5xl font-800 italic uppercase tracking-tighter text-white">Retailer <span class="text-slate-500">Intelligence</span></h1>
        </header>
        <main id="contentRoot">
            <div id="emptyState" class="h-64 flex flex-col items-center justify-center border-2 border-dashed border-slate-800 rounded-[3rem]">
                <p class="text-slate-700 font-800 uppercase text-xs">Loading Intelligence...</p>
            </div>
        </main>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[150] bg-[#0f1115]/98 backdrop-blur-xl hidden overflow-y-auto">
        <div class="max-w-5xl mx-auto p-6 md:p-12">
            <div id="modalBody" class="bg-[#1a1d23] rounded-[3rem] p-8 md:p-16 border border-slate-800 shadow-2xl"></div>
        </div>
    </div>

    <script>
        let performanceData = [];

        window.onload = async () => {
            lucide.createIcons();
            
            // Check if retailerData loaded from data.js
            if (typeof retailerData !== 'undefined') {
                importLocalData();
            }

            const urlParams = new URLSearchParams(window.location.search);
            const retailerId = urlParams.get('bizid');

            if (retailerId) {
                // Instantly hide login
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                
                // Wait briefly for scripts to catch up
                setTimeout(() => renderRetailerOnlyView(retailerId), 500);
            }
        };

        function importLocalData() {
            Object.keys(retailerData).forEach(id => {
                performanceData.push({
                    'Bizom ID': id,
                    'Shop Name': retailerData[id].name,
                    'Target': retailerData[id].target || 0,
                    'Total Sales': retailerData[id].balance || 0
                });
            });
        }

        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            } else { alert("Invalid Credentials"); }
        }

        function renderRetailerOnlyView(bizId) {
            const r = performanceData.find(i => String(i['Bizom ID']) === String(bizId));
            if(!r) {
                document.getElementById('emptyState').innerHTML = `<p class="text-rose-500">Retailer ID ${bizId} not found in data.js</p>`;
                return;
            }

            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('modalBody').innerHTML = `
                <div class="text-center mb-12">
                    <h2 class="text-4xl md:text-6xl font-800 text-white italic uppercase">${r['Shop Name']}</h2>
                    <p class="text-blue-400 font-bold mt-4">BIZOM ID: ${bizId}</p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 block">Target</span><p class="text-2xl font-800">${r['Target']}</p></div>
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 block">Actual</span><p class="text-2xl font-800 text-emerald-500">${r['Total Sales']}</p></div>
                    <div class="bg-[#111419] p-6 rounded-3xl text-center border border-white/5"><span class="text-[9px] text-slate-500 block">Gap</span><p class="text-2xl font-800 text-rose-500">${r['Target'] - r['Total Sales']}</p></div>
                </div>`;
        }
    </script>
</body>
</html>
