<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Intelligence - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; margin: 0; overflow-x: hidden; }
        
        /* PRE-LOADER STYLES */
        .loading-screen { position: fixed; inset: 0; z-index: 9999; background: #0f1115; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* BYPASS CSS: If URL has ID, Login is GONE */
        html.is-retailer #loginScreen { display: none !important; visibility: hidden !important; }
        html.is-retailer #mainApp { display: block !important; opacity: 1 !important; }

        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-field { background: #1e232d; border: 1px solid #334155; border-radius: 1rem; padding: 1.15rem; width: 100%; outline: none; color: #f8fafc; }
        
        /* Hide UI elements for Retailers */
        .retailer-hide { display: none !important; }
    </style>

    <script>
        // CRITICAL: RUNS BEFORE BODY RENDERS
        const params = new URLSearchParams(window.location.search);
        const retailerId = params.get('id');
        if (retailerId) {
            document.documentElement.classList.add('is-retailer');
        }
    </script>
</head>
<body>

    <div id="loader" class="loading-screen">
        <div class="spinner"></div>
        <p class="mt-4 text-[10px] font-800 tracking-[0.3em] text-blue-500 uppercase">Securing Connection...</p>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0f1115] flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 rounded-[2rem] bg-[#1a1d23] border border-slate-800 shadow-2xl text-center">
            <h2 class="text-3xl font-800 text-white italic uppercase mb-8 tracking-tighter">System <span class="text-slate-500">Login</span></h2>
            <div class="space-y-4">
                <input type="text" id="userInput" placeholder="Identity" class="input-field text-sm font-semibold">
                <input type="password" id="passInput" placeholder="Passcode" class="input-field text-sm font-semibold">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-800 uppercase text-xs tracking-widest transition-all">Enter</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden opacity-0 transition-opacity duration-700">
        <div class="max-w-6xl mx-auto p-4 md:p-10">
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-2xl font-800 italic uppercase tracking-tighter text-white">Live <span class="text-slate-500">Portal</span></h1>
                <div id="adminTools" class="flex gap-2">
                    <button onclick="document.getElementById('fileInput').click()" class="glass px-4 py-2 rounded-xl text-[10px] font-bold text-blue-400">SYNC DATA</button>
                    <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls">
                </div>
            </header>

            <div id="adminContent" class="space-y-6">
                <div id="emptyState" class="p-20 text-center border border-dashed border-slate-800 rounded-[2rem] text-slate-600 font-bold uppercase text-xs tracking-widest">Select Region to Begin</div>
            </div>

            <div id="detailModal" class="hidden fixed inset-0 z-[200] bg-[#0f1115] overflow-y-auto">
                <div class="max-w-4xl mx-auto p-6 md:p-12" id="modalTarget">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const GIST_ID = "2f31d97be896afbdb99de57d7a2b8dfd";
        window.performanceData = [];

        window.onload = async () => {
            await loadCloudData();
            document.getElementById('loader').style.display = 'none';
            
            const params = new URLSearchParams(window.location.search);
            const rId = params.get('id');

            if (rId) {
                // If Retailer: Kill Login, Show Dashboard
                document.getElementById('loginScreen').remove();
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('mainApp').style.opacity = "1";
                document.getElementById('adminTools').remove();
                executeBypass(rId);
            } else {
                // If Admin: Just show login
                document.getElementById('loginScreen').style.display = 'flex';
            }
            lucide.createIcons();
        };

        async function loadCloudData() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
                const data = await res.json();
                window.performanceData = JSON.parse(data.files["data.json"].content);
            } catch (e) { console.error("Data Load Error"); }
        }

        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').remove();
                document.getElementById('mainApp').classList.remove('hidden');
                document.getElementById('mainApp').style.opacity = "1";
            } else { alert("Unauthorized"); }
        }

        function getExcelVal(row, key) {
            const k = Object.keys(row).find(x => x.toLowerCase().replace(/\s/g,'').includes(key.toLowerCase()));
            return k ? row[k] : 0;
        }

        function executeBypass(id) {
            const r = window.performanceData.find(x => String(getExcelVal(x, 'Bizom ID')) === String(id));
            const modal = document.getElementById('detailModal');
            const target = document.getElementById('modalTarget');
            
            modal.classList.remove('hidden');
            
            if (!r) {
                target.innerHTML = `<div class="text-center py-20"><h1 class="text-xl font-800 text-rose-500">RETAILER ID ${id} NOT FOUND</h1></div>`;
                return;
            }

            target.innerHTML = `
                <div class="space-y-8">
                    <div class="text-center">
                        <h2 class="text-4xl font-800 text-white italic uppercase tracking-tighter">${getExcelVal(r, 'Shop Name')}</h2>
                        <p class="text-slate-500 font-bold text-[10px] mt-2 tracking-[0.4em]">ID: ${id}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="glass p-8 rounded-[2rem] text-center border-b-4 border-blue-500">
                            <p class="text-[10px] font-800 text-slate-500 uppercase mb-2">Monthly Target</p>
                            <span class="text-3xl font-800 text-white">${getExcelVal(r, 'Target')}</span>
                        </div>
                        <div class="glass p-8 rounded-[2rem] text-center border-b-4 border-emerald-500">
                            <p class="text-[10px] font-800 text-slate-500 uppercase mb-2">Achieved</p>
                            <span class="text-3xl font-800 text-emerald-400">${getExcelVal(r, 'Total Sales')}</span>
                        </div>
                    </div>

                    <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-8 rounded-[2rem] shadow-xl text-center">
                        <p class="text-[10px] font-800 text-white/60 uppercase mb-1">Estimated Payout</p>
                        <span class="text-4xl font-800 text-white">Rs. ${getExcelVal(r, 'Total Payout') || 0}</span>
                    </div>

                    <div class="glass p-6 rounded-[2rem]">
                        <canvas id="retailerChart" height="200"></canvas>
                    </div>
                </div>
            `;

            new Chart(document.getElementById('retailerChart'), {
                type: 'bar',
                data: {
                    labels: ['6mg', '10mg', '14mg', '17mg'],
                    datasets: [{
                        label: 'Sales',
                        data: [getExcelVal(r,'6mg'), getExcelVal(r,'10mg'), getExcelVal(r,'14mg'), getExcelVal(r,'17mg')],
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'],
                        borderRadius: 10
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } } }
                }
            });
        }
    </script>
</body>
</html>
