<script>

    async function loadCloudData() {

    // UPDATED: Forces clean string return to fix matching issues
    function getExcelVal(row, key) {
        const k = Object.keys(row).find(x => x.toLowerCase().replace(/\s/g,'').includes(key.toLowerCase().replace(/\s/g,'')));

        return String(val).trim(); [cite: 31]
