<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retailer Tracker - Executive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f1115; color: #e2e8f0; background-image: linear-gradient(135deg, #0f1115 0%, #1a1d23 100%); background-attachment: fixed; }
        .glass { background: rgba(30, 35, 45, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .white-card { background: white; color: #0f172a; border-radius: 2rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .white-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.3); }
        .status-glow-green { box-shadow: 0 0 20px rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3) !important; }
        .status-glow-red { box-shadow: 0 0 20px rgba(244, 63, 94, 0.1); border-color: rgba(244, 63, 94, 0.2) !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input::placeholder { color: #475569; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen pb-20 overflow-x-hidden">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0f1115] p-6">
        <div class="glass w-full max-max-w-md p-10 rounded-[2.5rem] text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-2xl shadow-indigo-500/20">
                <i data-lucide="shield-check" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-3xl font-800 text-white mb-2 italic tracking-tighter uppercase">Identity</h1>
            <p class="text-slate-500 text-sm mb-10 font-500 uppercase tracking-widest">Executive Terminal</p>
            <div class="space-y-4">
                <input id="userInput" type="text" placeholder="IDENTITY" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-indigo-500 text-white font-800 tracking-widest uppercase">
                <input id="passInput" type="password" placeholder="PASSCODE" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl outline-none focus:border-indigo-500 text-white font-800 tracking-widest uppercase">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-800 p-5 rounded-2xl transition-all shadow-lg shadow-indigo-500/25 uppercase tracking-widest mt-4">Initialize</button>
            </div>
            <div id="qrLoadingMsg" class="hidden mt-6 flex flex-col items-center gap-2">
                <div class="loader"></div>
                <p class="text-indigo-400 text-[10px] font-800 tracking-widest uppercase">Verifying QR Access...</p>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden max-w-5xl mx-auto px-4 pt-10">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-800 text-white italic uppercase tracking-tighter leading-none mb-1">Retailer Tracker</h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p id="topDate" class="text-[10px] font-800 text-slate-500 uppercase tracking-[0.3em]"></p>
                </div>
            </div>
            <div id="syncBtnContainer" class="glass p-1 rounded-2xl border border-white/10 flex items-center transition-all duration-500">
                <label for="fileInput" class="flex items-center gap-3 px-5 py-3 cursor-pointer group">
                    <i id="syncIcon" data-lucide="cloud-lightning" class="w-5 h-5 text-indigo-400 transition-transform group-hover:scale-110"></i>
                    <span id="syncText" class="text-[10px] font-800 text-slate-400 uppercase tracking-widest">Sync Gist</span>
                    <input id="fileInput" type="file" accept=".xlsx" class="hidden">
                </label>
            </div>
        </header>

        <div id="adminFilters" class="grid grid-cols-2 gap-4 mb-8">
            <select id="regionSelect" onchange="updateAreas()" class="glass p-5 rounded-2xl text-white font-800 uppercase tracking-widest outline-none border border-white/5">
                <option value="">Select Region</option>
                <option value="CPR">CPR (Central)</option>
                <option value="NPR">NPR (North)</option>
                <option value="SPR">SPR (South)</option>
                <option value="S&B">S&B (Sindh/Baloch)</option>
            </select>
            <select id="areaSelect" onchange="renderTerritoryView()" disabled class="glass p-5 rounded-2xl text-white font-800 uppercase tracking-widest opacity-40 outline-none border border-white/5">
                <option value="">Select Area Cluster</option>
            </select>
        </div>

        <div id="emptyState" class="text-center py-20"><div class="text-slate-600 font-800 uppercase tracking-[0.5em] text-xs">Awaiting Selection</div></div>
        
        <div id="territorySection" class="hidden animate-in fade-in duration-500">
            <h3 class="text-[10px] font-800 text-slate-500 uppercase tracking-[0.5em] mb-6 flex items-center gap-3"><i data-lucide="map" class="w-3 h-3"></i> Select Territory</h3>
            <div id="territoryGrid" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>

        <div id="marketSection" class="hidden animate-in fade-in duration-500">
            <h3 class="text-[10px] font-800 text-slate-500 uppercase tracking-[0.5em] mb-6 flex items-center gap-3"><i data-lucide="shopping-bag" class="w-3 h-3"></i> Select Market</h3>
            <div id="marketGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </div>

        <div id="shopSection" class="hidden animate-in fade-in duration-500">
            <div class="flex items-center justify-between mb-8 bg-white/5 p-4 rounded-3xl border border-white/5">
                <div class="flex items-center gap-3 px-2"><i data-lucide="search" class="w-4 h-4 text-slate-500"></i><input id="shopSearch" onkeyup="filterShops()" type="text" placeholder="SEARCH SHOP..." class="bg-transparent border-none outline-none text-white font-800 uppercase text-xs tracking-widest"></div>
            </div>
            <div id="shopList" class="space-y-4"></div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 z-[150] bg-[#0f1115]/95 backdrop-blur-xl p-4 overflow-y-auto hidden">
        <div class="max-w-4xl mx-auto py-10">
            <button onclick="closeModal()" class="mb-8 flex items-center gap-2 text-slate-500 hover:text-white transition-colors"><i data-lucide="arrow-left" class="w-4 h-4"></i><span class="text-[10px] font-800 uppercase tracking-widest">Back to list</span></button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const GIST_ID = "2f31d97be896afbdb99de57d7a2b8dfd";
        window.performanceData = [];
        let currentTerritory = '';

        // Hierarchy Data
        const hierarchyData = {"CPR":{"Lahore":{"Kasur":["Kasur"],"Mughalpura":["Lahore"],"Gulberg":["Lahore"],"DHA":["Lahore"],"Raiwind":["Lahore"],"Shahdara":["Shahdara"],"Samanabad":["Lahore"],"Islampura":["Lahore"],"Railway Station":["Lahore"],"Mall Road":["Lahore"],"Wall City":["Lahore"],"Model Town":["Lahore"],"Township":["Lahore"]},"Faisalabad":{"Jhang":["AP Sial","Jhang"],"Pensera":["AP Banglow","Bhowana","Pensera"],"Rabwah":["Rabwah"],"Faisalabad-A":["Faisalabad"],"Faisalabad-B":["Faisalabad"],"Faisalabad-C":["Faisalabad"],"Toba Tek Singh":["Gojra","Shorkot","Toba Tek Singh"],"Jaranwala":["Jaranwala"],"MoreKhunda":["MoreKhunda"],"Shahkot":["Shahkot"],"Samundri":["Mureedwala","Samundri","Tandlianwala"]},"Gujranwala":{"Sialkot":["Daska","Sialkot"],"Daska":["Daska","Pasrur","Sambrial"],"Narowal":["Narang Mandi","Narowal","Shakargarh","Zafarwal"],"Wazirabad":["Ali Pur Chattha","Qilla Didar Singh","Wazirabad"],"Gujranwala-A":["Gujranwala"],"Gujranwala-B":["Gujranwala","Gujranwala Cantt"],"Hafizabad":["Hafizabad","Nowshera Virkan","Pindi Bhattian"],"Sheikhupura":["Farooqabad","Khanqa Dogran","Sheikhupura"],"Kamoke":["Kamoke","Muridke"]}},"NPR":{"Islamabad":{"Chakwal":["Chakwal"],"Talagang":["Fateh Jang","Talagang"],"Murree":["Gujar Khan","Kahuta","Kallar","Murree"],"Islamabad West":["Islamabad"],"Islamabad Suburb":["Islamabad"],"Islamabad East":["Islamabad"],"Rawalpindi A":["Rawalpindi"],"Rawalpindi B":["Rawalpindi"],"Rawalpindi C":["Rawalpindi"]},"Jhelum":{"Gujrat":["Daulat Nagar","Gujrat","Jalalpur"],"Dinga":["Lalamusa","Phalia"],"Mirpur":["Islamghar","Mirpur"],"Mandibhaudin":["Khewra","Mandi Bahauddin","PDKhan","Pinanwal"],"Jhelum":["Jhelum"]},"Northern Area":{"Abbottabad":["Abbottabad","Haripur"],"Wah":["Attock","Taxila","Wah Cantt"],"Muzaffarabad":["Bagh","Muzaffarabad"],"Mansehra":["Balakot","Besham","Mansehra"],"Rawalakot":["F Kahutta","Hajeera","Rawalakot"],"Gilgit":["Gilgit","Skardu"],"Kotli":["Kotli","Plandri"]},"Peshawar":{"DI Khan":["Bannu","DIKhan","Wana"],"Minghora":["Batkhela","Chitral","Mingora","Timergara"],"Peshawar B":["Charsadda","Peshawar"],"Kohat":["Hangu","Karak","Kohat"],"Mardan":["Mardan","Nowshera","Swabi"],"Peshawar A":["Peshawar"]},"Sargodha":{"Bhalwal":["Bhalwal","Bhera","Kotmomin"],"Mianwali":["Isakhel","Mianwali","Quaidabad","Rangpur"],"Joharabad":["Khushab","Sillanwali"],"Sargodha A":["Sargodha"],"Sargodha B":["Sargodha"]}},"SPR":{"Bahawalpur":{"Khanbela":["AP East","Khanbela"],"Bahawalpur":["Bahawalpur"],"Chishtian":["Chishtian"],"Yazman":["Faqirwali","Yazman"],"Lodhran":["Jalalpur Pirwala","Lodhran"],"RYK":["Rahim Yar Khan"]},"DG Khan":{"Bhakkar":["Bhakkar"],"Layyah":["Layyah"],"Kot Addu":["Chowkmunda","Kot Addu","Taunsa"],"Rajanpur":["Fazilpur","Jampur","Rajanpur","Rojhan"],"Muzaffargarh":["Jatoi","Muzafargarh","Rohilanwali"],"DG Khan":["DG Khan","Kot Chutta","Sakhi Sarwar"]},"Sukkur":{"Khairpur":["Choondko","Gambat","Khairpur Mirs","Pir Jo Goth"],"Jacobabad":["Dera Allah Yar","JACOBABAD","Kandhkot","Kandhkot","Kashmore","Usta Muhammad"],"Ghotki":["Ghotki","Mirpur Mathelo","Rohri","UBARO"],"Sukkur":["Shikarpur","Sukkur","Thull"]},"Sahiwal":{"Sahiwal":["Sahiwal"],"Arifwala":["Arifwala","Bahawalnagar"],"Chichawatni":["Chichawatni","Kamalia"],"Pakpattan":["Depalpur","Minchinabad","Pakpattan","Theeng More"],"Pattoki":["Pattoki","Theeng More"],"Okara":["Okara","Renala Khurd"]},"Multan":{"Burewala":["Burewala","Luddan"],"Dunyapur":["Dunyapur","Mailsi"],"Vehari":["Jahanian","Vehari"],"Kabirwala":["Kabirwala"],"Khanewal":["Khanewal"],"Multan":["Multan"],"Mian Channu":["Mianchanu","Pir Mahal"]}},"S&B":{"Hyderabad":{"Badin Territory":["Badin","Golrachi","Matli","Tando Muhammad Khan"],"Thar Territory":["Digri","Kunri","Naukot","Umerkot"],"Hyderabad Territory":["Hyderabad","Jamshoro","Kotri"],"Mirpurkhas Territory":["Khipro","Mirpurkhas","Tando Allahyar"],"Thatta Territory":["Nooriabad","Thatta"],"TandoAdam Territory":["SP Chakar","Saeedabad","Sanghar","Shahdadpur","Tando Adam"]},"Karachi":{"DHA":["Karachi"],"GIB":["Karachi"],"KBR":["Karachi"],"KRG":["Karachi"],"LDI":["Karachi"],"MLR":["Karachi"],"MTV":["Karachi"],"NKR":["Karachi"],"OLC":["Karachi"]},"Nawabshah":{"Naushero Territory":["Bhiria","Kandiaro","Mehrabpur","Moro","Naushero Feroze","Nawabshah","Qazi Ahmed"],"Dadu Territory":["Dadu","Khairpur Nathan Shah","Mehar","Sann","Sehwan"],"Nawabshah":["Daur","Nawabshah","Qazi Ahmed"],"Nawabshah Territory":["Nawabshah"],"Kamber Territory":["Kamber Ali khan","Naseerabad","Shahdad kot"],"Larkana Territory":["Larkana","Naudero","Ratodero"]},"Quetta":{"Coastal Territory":["Gwadar","Uthal"],"Khuzdar Territory":["Khuzdar","Mastung"],"Lorlai Territory":["Loralai","Qilla Saifullah","ZHOB"],"Quetta B Territory":["Pishin"],"Quetta A Territory":["Quetta"]}}};

        // --- PRE-RENDER INTERCEPTOR ---
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const rId = urlParams.get('id');
            if (rId) {
                // Instantly block the login screen from appearing
                document.addEventListener("DOMContentLoaded", () => {
                    document.getElementById('userInput').style.display = 'none';
                    document.getElementById('passInput').style.display = 'none';
                    document.querySelector('button[onclick="handleLogin()"]').style.display = 'none';
                    document.getElementById('qrLoadingMsg').classList.remove('hidden');
                });
            }
        })();

        window.onload = async () => {
            document.getElementById('topDate').innerText = new Date().toDateString();
            await syncFromCloud();
            lucide.createIcons();
            initSyncLogic();
            checkQRBypass();
        };

        function checkQRBypass() {
            const urlParams = new URLSearchParams(window.location.search);
            const rId = urlParams.get('id');
            if (rId && window.performanceData.length > 0) {
                const exists = window.performanceData.some(r => String(getExcelVal(r, 'Bizom ID')) === String(rId));
                if (exists) {
                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('mainApp').classList.remove('hidden');
                    
                    // READ ONLY LOCKS
                    document.getElementById('syncBtnContainer').style.display = 'none';
                    document.getElementById('adminFilters').style.display = 'none';
                    
                    openDrilldown(rId);
                } else {
                    alert("Invalid QR ID. Please login manually.");
                    location.href = window.location.pathname; // Clear ID and reload
                }
            }
        }

        async function syncFromCloud() {
            try {
                const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`);
                const data = await res.json();
                window.performanceData = JSON.parse(data.files["data.json"].content);
            } catch (e) { console.error("Sync Error"); }
        }

        function handleLogin() {
            if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
            } else { alert("Invalid Credentials"); }
        }

        function norm(s) { return String(s || "").toLowerCase().replace(/\s/g, '').trim(); }
        
        function getExcelVal(row, key) { 
            const target = norm(key);
            for (let k in row) { if (norm(k).includes(target)) return row[k]; } 
            return 0;
        }

        function updateAreas() {
            const reg = document.getElementById('regionSelect').value;
            const areaSel = document.getElementById('areaSelect');
            areaSel.innerHTML = '<option value="">Select Area Cluster</option>';
            if(reg) {
                Object.keys(hierarchyData[reg]).sort().forEach(a => areaSel.innerHTML += `<option value="${a}">${a}</option>`);
                areaSel.disabled = false; areaSel.classList.remove('opacity-40');
            }
            hideAll(); document.getElementById('emptyState').classList.remove('hidden');
        }

        function renderTerritoryView() {
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            if(!reg || !area) return;
            const territories = Object.keys(hierarchyData[reg][area]).sort();
            hideAll(); document.getElementById('territorySection').classList.remove('hidden');
            document.getElementById('territoryGrid').innerHTML = territories.map(t => `<div onclick="showMarkets('${t}')" class="white-card p-10 h-44 flex flex-col justify-center text-center"><h4 class="text-xl font-800 uppercase italic">${t}</h4></div>`).join('');
        }

        function showMarkets(tName) {
            currentTerritory = tName;
            const reg = document.getElementById('regionSelect').value;
            const area = document.getElementById('areaSelect').value;
            const markets = hierarchyData[reg][area][tName].sort();
            hideAll(); document.getElementById('marketSection').classList.remove('hidden');
            document.getElementById('marketGrid').innerHTML = markets.map(m => `<div onclick="showShops('${m}')" class="white-card p-6 h-32 flex items-center justify-center text-center"><h4 class="text-[10px] font-800 uppercase tracking-widest">${m}</h4></div>`).join('');
        }

        function showShops(mName) {
            hideAll();
            document.getElementById('shopSection').classList.remove('hidden');
            const shops = window.performanceData.filter(r => norm(getExcelVal(r, 'Market')).includes(norm(mName)));
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const daysRemaining = Math.max(1, daysInMonth - now.getDate());
            document.getElementById('shopList').innerHTML = shops.map(r => {
                const target = parseFloat(getExcelVal(r, 'Target')) || 0;
                const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
                const bizId = getExcelVal(r, 'Bizom ID');
                const rrr = Math.max(0, (target - actual) / daysRemaining).toFixed(1);
                const rawName = getExcelVal(r, 'Shop Name') || getExcelVal(r, 'Shop') || getExcelVal(r, 'Retailer Name') || getExcelVal(r, 'Outlet');
                const displayName = (rawName && String(rawName).trim() !== "0") ? rawName : "Retailer";
                const isWinner = actual >= target && target > 0;

                return `
                <div onclick="openDrilldown('${bizId}')" class="glass group relative p-5 rounded-[2rem] flex justify-between items-center cursor-pointer mb-4 transition-all duration-300 hover:scale-[1.01] hover:bg-white/5 ${isWinner ? 'status-glow-green' : 'status-glow-red'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-4">
                            <div class="p-2 bg-indigo-500/10 rounded-lg"><i data-lucide="tag" class="w-4 h-4 text-indigo-400"></i></div>
                            <h4 class="text-xl font-800 text-white italic uppercase tracking-tighter">${displayName}</h4>
                        </div>
                        <div class="flex items-center gap-4">
                             <span class="text-lg font-800 text-white">T: ${target}</span>
                             <span class="text-lg font-800 text-emerald-400">A: ${actual}</span>
                             <span class="text-[10px] font-800 text-blue-400 uppercase">RRR: ${rrr}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function openDrilldown(bizId) {
            const r = window.performanceData.find(i => String(getExcelVal(i, 'Bizom ID')) === String(bizId));
            if(!r) return;
            const target = parseFloat(getExcelVal(r, 'Target')) || 0;
            const actual = parseFloat(getExcelVal(r, 'Total Sales')) || 0;
            const rawName = getExcelVal(r, 'Shop Name') || "Retailer";
            
            document.getElementById('detailModal').classList.remove('hidden');
            document.getElementById('modalBody').innerHTML = `
                <div class="text-center mb-8">
                    <h2 class="text-5xl font-800 text-white italic uppercase mb-2 tracking-tighter">${rawName}</h2>
                    <div id="qr-code-space" class="inline-block p-2 bg-white rounded-2xl mb-4"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-5 rounded-[2rem]"><span class="block text-[9px] font-800 text-slate-500 uppercase">Target</span><span class="text-2xl font-800 text-white">${target}</span></div>
                    <div class="glass p-5 rounded-[2rem]"><span class="block text-[9px] font-800 text-slate-500 uppercase">Actual</span><span class="text-2xl font-800 text-emerald-400">${actual}</span></div>
                </div>
                <div class="h-64 mt-10"><canvas id="drillChart"></canvas></div>`;
            
            new QRCode(document.getElementById("qr-code-space"), { text: `${window.location.origin}${window.location.pathname}?id=${bizId}`, width: 120, height: 120 });
            new Chart(document.getElementById('drillChart'), { type: 'bar', data: { labels: ['Target', 'Actual'], datasets: [{ data: [target, actual], backgroundColor: ['#1e293b', '#10b981'] }] }, options: { responsive: true, maintainAspectRatio: false } });
            lucide.createIcons();
        }

        function initSyncLogic() {
            document.getElementById('fileInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = async function(ev) {
                    const workbook = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    const token = prompt("Enter GitHub Token:");
                    if(!token) return;
                    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${token}` },
                        body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(jsonData, null, 2) } } })
                    });
                    alert("Synced!");
                    location.reload();
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function filterShops() {
            const term = document.getElementById('shopSearch').value.toLowerCase();
            Array.from(document.getElementById('shopList').children).forEach(c => c.style.display = c.innerText.toLowerCase().includes(term) ? 'flex' : 'none');
        }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function hideAll() { ['emptyState', 'territorySection', 'marketSection', 'shopSection'].forEach(id => document.getElementById(id).classList.add('hidden')); }
    </script>
</body>
</html>
