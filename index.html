<script>
    // STEP 1: IMMEDIATE INTERCEPTOR (Prevents Login Page from rendering)
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const rId = urlParams.get('id');
        if (rId) {
            // Add class immediately to HTML to trigger CSS overrides [cite: 13, 14]
            document.documentElement.className = "retailer-mode";
            
            // Inject a style to force-hide the login screen before it even paints
            const style = document.createElement('style');
            style.innerHTML = '#loginScreen { display: none !important; } #loadingState { display: flex !important; }';
            document.head.appendChild(style);
        }
    })();
</script>

<script>
    const GIST_ID = "2f31d97be896afbdb99de57d7a2b8dfd";
    window.performanceData = [];

    window.onload = async () => {
        await syncFromCloud();
        lucide.createIcons();
        
        const params = new URLSearchParams(window.location.search);
        const retailerId = params.get('id');
        
        if (retailerId) {
            // STEP 2: ROBUST DATA MATCHING 
            // We trim and force string comparison to ensure "127394" matches " 127394 "
            const cleanId = String(retailerId).trim();
            const match = window.performanceData.find(r => 
                String(getExcelVal(r, 'Bizom ID')).trim() === cleanId
            );

            if (match) {
                document.getElementById('loadingState').style.display = 'none';
                openDrilldown(cleanId); [cite: 24, 34]
            } else {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('detailModal').classList.remove('hidden'); [cite: 25]
                document.getElementById('modalBody').innerHTML = `
                    <div class="text-center py-10">
                        <h2 class='text-rose-500 font-800 text-xl uppercase'>Retailer ID Not Found</h2>
                        <p class="text-slate-500 text-xs mt-2">ID ${cleanId} is not in the synced database.</p>
                    </div>`;
            }
        }
    };

    async function syncFromCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`); [cite: 27]
            const data = await res.json(); [cite: 28]
            window.performanceData = JSON.parse(data.files["data.json"].content); [cite: 28]
        } catch (e) { 
            console.error("Sync Failed"); 
            document.getElementById('loadingState').innerHTML = "<p class='text-rose-500'>Connection Error</p>";
        }
    }

    function handleLogin() {
        if(document.getElementById('userInput').value === "admin" && document.getElementById('passInput').value === "51555777") { [cite: 29]
            document.getElementById('loginScreen').style.display = 'none'; [cite: 29]
            document.getElementById('mainApp').style.display = 'block'; [cite: 30]
        } else { alert("Access Denied"); }
    }

    function norm(s) { 
        return String(s || "").toLowerCase().replace(/\s/g, '').trim(); [cite: 31]
    }
    
    function getExcelVal(row, key) { 
        const target = norm(key); [cite: 32]
        for (let k in row) { 
            if (norm(k).includes(target)) return row[k]; [cite: 32]
        } 
        return 0; [cite: 33]
    }

    function openDrilldown(bizId) {
        const r = window.performanceData.find(i => String(getExcelVal(i, 'Bizom ID')).trim() === String(bizId).trim()); [cite: 34]
        if(!r) return;
        
        document.getElementById('detailModal').classList.remove('hidden'); [cite: 35]
        document.getElementById('modalBody').innerHTML = `
            <div class="text-center mb-8">
                <h2 class="text-3xl font-800 text-white italic uppercase mb-2">${getExcelVal(r, 'Shop Name')}</h2> [cite: 35]
                <div class="text-[10px] font-800 text-slate-500 uppercase tracking-widest">ID: ${bizId}</div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-6 rounded-3xl text-center">
                    <div class="text-[10px] text-slate-500 uppercase font-800 mb-2">Target</div>
                    <div class="text-2xl font-800">${getExcelVal(r, 'Target')}</div> [cite: 36]
                </div>
                <div class="glass p-6 rounded-3xl text-center">
                    <div class="text-[10px] text-slate-500 uppercase font-800 mb-2">Actual</div>
                    <div class="text-2xl font-800 text-emerald-400">${getExcelVal(r, 'Total Sales')}</div> [cite: 36]
                </div>

            <div class="mt-8 p-6 bg-blue-500/10 rounded-3xl border border-blue-500/20 text-center">

                <div class="text-3xl font-800 text-blue-400">Rs. ${getExcelVal(r, 'Total Payout') || 0}</div> [cite: 37, 38]
            </div>
        `;
    }
</script>
