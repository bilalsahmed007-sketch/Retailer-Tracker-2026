<script>
    // Configuration - REPLACE TOKEN HERE IF CLOUD SYNC FAILS
    const GIST_ID = "1c566a18fa48fd05d3e65b560b0a6853";
    const GITHUB_TOKEN = "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";
    
    let performanceData = [];
    let currentTerritory = '';

    // Initialize Application
    window.onload = async () => {
        console.log("System: Booting...");
        const now = new Date();
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        document.getElementById('topDate').innerText = `${now.getDate()} ${months[now.getMonth()]}`;
        
        // Step 1: Sync data from Cloud (Gist)
        await syncFromCloud();
        
        // Step 2: Initialize UI icons
        lucide.createIcons();
        
        // Step 3: Check if a specific retailer is logged in
        checkRetailerAccess();
    };

    // --- DATA SYNC LOGIC ---

    async function syncFromCloud() {
        try {
            console.log("CloudSync: Fetching from GitHub...");
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?nocache=${Date.now()}`, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
            });

            if (res.ok) {
                const data = await res.json();
                const content = data.files["data.json"].content;
                performanceData = JSON.parse(content);
                console.log("CloudSync: Success. Records loaded:", performanceData.length);
            } else {
                throw new Error(`GitHub returned ${res.status}`);
            }
        } catch (e) {
            console.warn("CloudSync: Failed. Loading local data.js fallback...", e.message);
            fallbackToLocalData();
        }
    }

    function fallbackToLocalData() {
        // Checks if retailerData exists in the included data.js file
        if (typeof retailerData !== 'undefined') {
            performanceData = Object.keys(retailerData).map(id => ({
                'Bizom ID': id,
                'Shop Name': retailerData[id].name,
                'Target': retailerData[id].target,
                'Total Sales': retailerData[id].balance,
                '6mg': retailerData[id]['6mg'],
                '10mg': retailerData[id]['10mg'],
                '14mg': retailerData[id]['14mg'],
                '17mg': retailerData[id]['17mg'],
                'Market': "General"
            }));
            console.log("Fallback: Data mapped from data.js");
        }
    }

    // --- UI & BUSINESS LOGIC ---

    function checkRetailerAccess() {
        const urlParams = new URLSearchParams(window.location.search);
        const bizId = urlParams.get('retailer');
        if (bizId) {
            console.log("Retailer Mode Detected:", bizId);
            setTimeout(() => renderRetailerOnlyView(bizId), 800);
        }
    }

    function openDrilldown(bizId) {
        // Robust ID lookup (handles string vs number issues)
        const record = performanceData.find(i => 
            String(i['Bizom ID']).trim() === String(bizId).trim()
        );

        if (!record) {
            console.error("Lookup Failed: ID", bizId, "not found in current dataset.");
            alert("Error: Retailer data not found.");
            return;
        }

        renderModal(record);
    }

    function renderModal(r) {
        const modal = document.getElementById('detailModal');
        const body = document.getElementById('modalBody');
        
        // Calculate Percentages
        const target = parseFloat(r['Target']) || 1;
        const sales = parseFloat(r['Total Sales']) || 0;
        const pct = Math.min(Math.round((sales / target) * 100), 100);

        body.innerHTML = `
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-2xl font-extrabold text-white">${r['Shop Name']}</h2>
                    <p class="text-blue-400 font-mono text-sm">ID: ${r['Bizom ID']}</p>
                </div>
                <div class="text-right">
                    <span class="px-3 py-1 bg-blue-500/20 text-blue-400 rounded-full text-xs font-bold uppercase tracking-wider">
                        ${r['Market'] || 'N/A'}
                    </span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <p class="text-gray-400 text-xs mb-1 uppercase">Target</p>
                    <p class="text-xl font-bold">${target.toLocaleString()}</p>
                </div>
                <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                    <p class="text-gray-400 text-xs mb-1 uppercase">Achievement</p>
                    <p class="text-xl font-bold text-blue-400">${sales.toLocaleString()}</p>
                </div>
            </div>

            <div class="mb-8">
                <div class="flex justify-between text-xs mb-2 uppercase font-bold tracking-widest text-gray-500">
                    <span>Target Progress</span>
                    <span class="text-blue-400">${pct}%</span>
                </div>
                <div class="h-3 bg-white/5 rounded-full overflow-hidden border border-white/5">
                    <div class="h-full bg-gradient-to-r from-blue-600 to-indigo-400 transition-all duration-1000" style="width: ${pct}%"></div>
                </div>
            </div>
        `;
        
        modal.classList.remove('hidden');
    }

    // --- UTILITIES ---
    function closeModal() {
        document.getElementById('detailModal').classList.add('hidden');
    }

    function renderRetailerOnlyView(bizId) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('appHeader').style.display = 'none';
        openDrilldown(bizId);
    }
</script>
