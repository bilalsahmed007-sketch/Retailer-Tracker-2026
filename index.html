    // --- FIX 1: DYNAMIC DROPDOWNS ---
    function updateAreas() {
        const reg = document.getElementById('regionSelect').value;
        const areaSel = document.getElementById('areaSelect');
        areaSel.innerHTML = '<option value="">Select Area Cluster</option>';
        
        if (reg && hierarchyData[reg]) {
            Object.keys(hierarchyData[reg]).sort().forEach(a => {
                areaSel.innerHTML += `<option value="${a}">${a}</option>`;
            });
            areaSel.disabled = false;
            areaSel.classList.remove('opacity-40');
        }
        hideAll();
        document.getElementById('emptyState').classList.remove('hidden');
    }

    function renderTerritoryView() {
        const reg = document.getElementById('regionSelect').value;
        const area = document.getElementById('areaSelect').value;
        if (!reg || !area) return;

        const territories = Object.keys(hierarchyData[reg][area]).sort();
        hideAll();
        const container = document.getElementById('territorySection');
        container.classList.remove('hidden');
        document.getElementById('territoryGrid').innerHTML = territories.map(t => `
            <div onclick="showMarkets('${t}')" class="white-card p-10 h-44 flex flex-col justify-center text-center cursor-pointer">
                <i data-lucide="map-pinned" class="w-8 h-8 text-blue-500 mx-auto mb-4"></i>
                <h4 class="text-xl font-800 uppercase italic tracking-tighter">${t}</h4>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function showMarkets(tName) {
        currentTerritory = tName;
        const reg = document.getElementById('regionSelect').value;
        const area = document.getElementById('areaSelect').value;
        const markets = hierarchyData[reg][area][tName].sort();
        
        hideAll();
        document.getElementById('marketSection').classList.remove('hidden');
        document.getElementById('marketGrid').innerHTML = markets.map(m => `
            <div onclick="showShops('${m}')" class="white-card p-6 h-32 flex items-center justify-center text-center cursor-pointer">
                <h4 class="text-xs font-800 uppercase tracking-widest">${m}</h4>
            </div>
        `).join('');
    }

    // --- FIX 2: FILE UPLOAD & SYNC ---
    async function handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.SheetNames[0];
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
                console.log("Parsed Excel:", jsonData);
                await pushToCloud(jsonData);
            } catch (err) {
                alert("Excel parse failed: " + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    async function pushToCloud(data) {
        const indicator = document.getElementById('syncIndicator');
        indicator.classList.remove('hidden');
        
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GITHUB_TOKEN}` },
                body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(data) } } })
            });

            if (res.ok) {
                performanceData = data;
                alert("Cloud Updated Successfully!");
                location.reload(); // Refresh to show new data
            } else {
                throw new Error("GitHub Error: " + res.status);
            }
        } catch (e) {
            alert("Sync Failed: " + e.message);
        } finally {
            indicator.classList.add('hidden');
        }
    }

    // Core Load Logic
    async function syncFromCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?cb=${Date.now()}`);
            if (res.ok) {
                const d = await res.json();
                performanceData = JSON.parse(d.files["data.json"].content);
            }
        } catch (e) { console.error("Cloud load failed, using local."); }
    }

    function hideAll() {
        ['emptyState','territorySection','marketSection','shopSection'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.classList.add('hidden');
        });
    }
